<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; --grid-color: rgba(99, 72, 154, 0.05); }
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #f8f9ff;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; letter-spacing: -0.02em;
        }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        html { font-size: 17px; } 

        .text-gradient {
            background: linear-gradient(135deg, #4f319b 0%, #8c52ff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 실험실 섹션 도형 박스 업그레이드 */
        .lab-box {
            background: white; border: 1px solid #f1f1f4; border-radius: 2.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .lab-box:hover { 
            border-color: var(--sunny-purple); 
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(99, 72, 154, 0.08);
        }
        .lab-box:hover .icon-circle {
            background: var(--sunny-purple);
            color: white;
            transform: scale(1.1);
        }
        .icon-circle { transition: all 0.3s ease; }
        
        /* 연구단계 카드 호버 효과 추가 */
        .stage-card { 
            background: white; border-radius: 2rem; border: 1px solid rgba(0,0,0,0.05); 
            transition: all 0.3s ease;
        }
        .stage-card:hover {
            border-color: var(--sunny-purple);
            background: rgba(255, 255, 255, 1);
            transform: scale(1.02);
        }

        /* 성과공유회 카드 배경 애니메이션 */
        .cta-gradient {
            background: linear-gradient(-45deg, #63489a, #4f319b, #8c52ff, #63489a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 네비게이션 활성화 점 */
        .nav-active::after {
            content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; background: var(--sunny-purple); border-radius: 50%;
        }

        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1); }
    </style>
</head>
