<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; --grid-color: rgba(99, 72, 154, 0.05); }
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #fcfcff;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; letter-spacing: -0.02em;
        }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        /* 팀 프로필 이미지: 가로형 16:10 */
        .team-main-visual { 
            width: 100%; 
            max-width: 540px; 
            aspect-ratio: 16 / 10; 
            border-radius: 32px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 4px solid rgba(255,255,255,0.2);
        }

        /* 멤버 카드 및 이미지 */
        .member-card { 
            background: white; border: 1px solid #f0f0f0; border-radius: 20px; 
            padding: 10px; display: flex; align-items: center; gap: 12px;
            transition: all 0.3s ease;
        }
        .member-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
        .member-img { width: 48px; height: 48px; border-radius: 9999px; object-fit: cover; background: #f0f0f0; }

        /* 컨택 정보 텍스트 박스 */
        .contact-info-box {
            background: #f8f9ff; border-radius: 16px; padding: 12px 16px;
            border: 1px solid #eee; font-size: 13px; color: #444;
            display: flex; align-items: center; gap: 8px; word-break: break-all;
        }

        .theme-bg { transition: background-color 0.5s ease; }
        .team-nav-btn { transition: all 0.3s ease; opacity: 0.6; font-size: 11px; }
        .team-nav-btn:hover { opacity: 1; transform: translateY(-2px); }
        .team-nav-active { opacity: 1; border-bottom: 2px solid white; }
    </style>
</head>

<body>
    <header class="sticky top-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
            <a href="index.html"><img src="images/sunny_scholar_logo.png" alt="Logo" class="h-8"></a>
            <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                <a href="article_list.html" class="hover:text-[#63489a]">Articles</a>
                <a href="team_list.html" class="text-[#63489a]">Lab</a>
                <a href="about.html" class="hover:text-[#63489a]">About</a>
            </nav>
        </div>
    </header>

    <div id="quick-nav" class="theme-bg border-b border-white/10 py-3 overflow-x-auto">
        <div id="quick-nav-list" class="max-w-5xl mx-auto flex justify-center gap-6 px-6 font-black text-white/70 uppercase tracking-widest whitespace-nowrap"></div>
    </div>

    <div id="team-hero" class="theme-bg pt-12 pb-20 px-6 text-white relative overflow-hidden">
        <div class="max-w-6xl mx-auto relative z-10">
            <div class="flex items-center justify-between mb-12">
                <button onclick="moveTeam(-1)" class="p-3 hover:bg-white/10 rounded-full transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <div class="text-center">
                    <span id="display-team-order" class="inline-block px-3 py-1 bg-white/20 rounded-full text-[10px] font-black tracking-[0.2em] mb-3 uppercase">LOADING</span>
                    <h1 id="display-team-name" class="text-3xl md:text-5xl font-black tracking-tighter">로딩 중...</h1>
                </div>
                <button onclick="moveTeam(1)" class="p-3 hover:bg-white/10 rounded-full transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>

            <div class="flex flex-col md:flex-row items-center gap-10 max-w-5xl mx-auto">
                <div class="team-main-visual animate__animated animate__fadeInLeft">
                    <img id="display-team-img" src="" alt="Team Profile" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 text-center md:text-left animate__animated animate__fadeInRight">
                    <p id="display-team-desc" class="text-[14px] md:text-[15px] font-medium leading-relaxed break-keep opacity-90 text-white/90"></p>
                </div>
            </div>
        </div>
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-white/5 rounded-full blur-3xl"></div>
    </div>

    <main class="py-16 px-6 max-w-6xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-24">
            <section class="lg:col-span-2 bg-white p-8 md:p-10 rounded-[40px] border border-gray-100 shadow-sm">
                <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.3em] mb-8">Team Members</h2>
                <div id="member-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </section>

            <section class="bg-white p-8 md:p-10 rounded-[40px] border border-gray-100 shadow-sm flex flex-col">
                <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.3em] mb-8">Connect</h2>
                <div id="contact-container" class="space-y-4"></div>
            </section>
        </div>

        <section>
            <div class="flex items-center justify-between mb-10 px-2">
                <h2 class="text-3xl font-black text-gray-950 tracking-tight">Team Articles</h2>
                <a href="article_list.html" class="px-5 py-2 rounded-full border border-gray-200 text-[11px] font-black text-gray-500 hover:border-[#63489a] hover:text-[#63489a] transition-all bg-white">전체보기</a>
            </div>
            <div id="article-list-container"></div>
        </section>
    </main>

    <script src="data.js"></script>
    <script>
        let currentTeamId = "";
        let teamIds = [];

        function initTeamDetail() {
            const params = new URLSearchParams(window.location.search);
            currentTeamId = params.get('teamId');
            
            const baseData = typeof TEAM_DATA !== 'undefined' ? TEAM_DATA : {};
            const detailData = typeof TEAM_DETAILS !== 'undefined' ? TEAM_DETAILS : {};

            teamIds = Object.keys(baseData);
            if (!currentTeamId) currentTeamId = teamIds[0];

            const teamBase = baseData[currentTeamId];
            const teamDetail = detailData[currentTeamId] || {};

            if (!teamBase) return;

            // 테마 적용
            const mainColor = teamBase.theme?.main || '#63489a';
            document.querySelectorAll('.theme-bg').forEach(el => el.style.backgroundColor = mainColor);
            renderQuickNav(baseData);

            // 기본 정보 매핑
            document.getElementById('display-team-name').innerText = teamBase.teamName || teamDetail.name;
            document.getElementById('display-team-desc').innerText = teamDetail.description || teamBase.summary;
            document.getElementById('display-team-order').innerText = teamBase.order || teamDetail.order;
            
            // 팀 메인 이미지
            const teamImg = document.getElementById('display-team-img');
            teamImg.src = teamDetail.teamProfileImg || './images/default_team.jpg';
            teamImg.onerror = () => teamImg.src = 'https://via.placeholder.com/800x500?text=SUNNY+TEAM';

            // 팀원 리스트 (Scholar -> SUNNY)
            const memberList = document.getElementById('member-list');
            memberList.innerHTML = (teamDetail.members || []).map(m => `
                <div class="member-card animate__animated animate__fadeInUp">
                    <img src="${m.img}" class="member-img" onerror="this.src='https://via.placeholder.com/100?text=👤'">
                    <div>
                        <p class="text-[15px] font-black text-gray-900">${m.name}</p>
                        <p class="text-[10px] text-[#63489a] font-black uppercase tracking-wider">SUNNY</p>
                    </div>
                </div>
            `).join('') || '<p class="text-gray-400 text-sm">등록된 멤버가 없습니다.</p>';

            // 컨택 포인트 (이메일 텍스트 + SNS 버튼)
            const contactContainer = document.getElementById('contact-container');
            let contactHTML = '';

            if (teamDetail.email) {
                contactHTML += `
                    <div class="contact-info-box">
                        <svg class="w-4 h-4 shrink-0 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <span>${teamDetail.email}</span>
                    </div>
                `;
            }

            if (teamDetail.instagram) {
                contactHTML += `
                    <a href="${teamDetail.instagram}" target="_blank" class="block w-full text-center py-3 bg-gradient-to-tr from-orange-400 via-red-500 to-purple-600 text-white rounded-xl font-black text-[12px] shadow-sm hover:brightness-110 transition-all">Instagram</a>
                `;
            }

            if (teamDetail.blog || teamDetail.homepage) {
                contactHTML += `
                    <a href="${teamDetail.blog || teamDetail.homepage}" target="_blank" class="block w-full text-center py-3 bg-gray-900 text-white rounded-xl font-black text-[12px] shadow-sm hover:bg-gray-800 transition-all">Homepage</a>
                `;
            }
            
            contactContainer.innerHTML = contactHTML || '<p class="text-gray-400 text-sm text-center">정보가 없습니다.</p>';

            renderTeamArticles(currentTeamId);
        }

        function renderQuickNav(data) {
            const nav = document.getElementById('quick-nav-list');
            nav.innerHTML = Object.entries(data).map(([id, team]) => `
                <a href="team_detail.html?teamId=${id}" class="team-nav-btn ${id === currentTeamId ? 'team-nav-active' : ''}">
                    ${team.teamName}
                </a>
            `).join('');
        }

        function moveTeam(direction) {
            const currentIndex = teamIds.indexOf(currentTeamId);
            let nextIndex = currentIndex + direction;
            if (nextIndex < 0) nextIndex = teamIds.length - 1;
            if (nextIndex >= teamIds.length) nextIndex = 0;
            window.location.href = `team_detail.html?teamId=${teamIds[nextIndex]}`;
        }

        function renderTeamArticles(teamId) {
            if (typeof SUNNY_DATA === 'undefined') return;
            const teamArticles = SUNNY_DATA.filter(art => art.teamId === teamId);
            const container = document.getElementById('article-list-container');
            if (teamArticles.length > 0) {
                container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    ${teamArticles.map(art => `
                        <a href="article_view.html?id=${art.id}" class="group block bg-white rounded-[32px] p-4 border border-transparent hover:border-gray-100 hover:shadow-xl transition-all duration-500">
                            <div class="aspect-[16/10] rounded-[24px] overflow-hidden mb-5"><img src="${art.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"></div>
                            <div class="px-2">
                                <span class="text-[10px] font-black text-[#63489a] uppercase tracking-widest bg-purple-50 px-2 py-1 rounded-md mb-3 inline-block">${art.part}</span>
                                <h4 class="font-black text-xl text-gray-900 group-hover:text-[#63489a] transition-colors leading-snug break-keep">${art.title}</h4>
                            </div>
                        </a>
                    `).join('')}</div>`;
            } else {
                container.innerHTML = `<div class="text-center py-20 text-gray-400 font-bold bg-white border border-dashed border-gray-200 rounded-[32px] text-sm">등록된 아티클이 아직 없습니다.</div>`;
            }
        }

        window.onload = initTeamDetail;
    </script>
</body>
</html>
