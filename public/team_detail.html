<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { 
            --sunny-purple: #63489a; 
            --sunny-gradient: linear-gradient(135deg, #4f319b 0%, #8c52ff 100%);
        }
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9ff; color: #1a1a1a; letter-spacing: -0.01em; }
        
        /* Glassmorphism */
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }

        /* 좌측 고정 팀 카드 스타일 */
        .team-profile-card {
            background: white;
            border-radius: 2rem;
            border: 1px solid #f1f1f4;
            box-shadow: 0 25px 50px -12px rgba(99, 72, 154, 0.1);
        }
        
        /* 정사각형 팀 로고 */
        .team-logo-box {
            width: 120px;
            height: 120px;
            border-radius: 2rem;
            overflow: hidden;
            background: var(--sunny-gradient);
            box-shadow: 0 10px 20px rgba(99, 72, 154, 0.2);
            margin: 0 auto 1.5rem auto;
        }
        .team-logo-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 타원형 팀원 프로필 */
        .member-profile-img {
            width: 80px;
            height: 110px;
            border-radius: 100px;
            overflow: hidden;
            background: #f3f4f6;
        }
        .member-profile-img img { width: 100%; height: 100%; object-fit: cover; }

        @media (min-width: 1024px) {
            .sticky-sidebar {
                position: sticky;
                top: 6rem; /* Header height + spacing */
                height: calc(100vh - 8rem);
                overflow-y: auto;
            }
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="fixed top-0 w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
            <a href="index.html" class="font-black text-xl tracking-tighter text-[#63489a]">SUNNY Scholar</a>
            <nav class="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-widest">
                <a href="article_list.html" class="hover:text-[#63489a] transition-colors">Articles</a>
                <a href="team_list.html" class="text-[#63489a]">Lab</a>
                <a href="about.html" class="hover:text-[#63489a] transition-colors">About</a>
            </nav>
        </div>
    </header>

    <main class="pt-24 pb-20 px-6 animate__animated animate__fadeIn">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-10 xl:gap-16">
            
            <aside class="w-full lg:w-[380px] xl:w-[420px] flex-shrink-0 sticky-sidebar">
                <div class="team-profile-card p-10 text-center">
                    <div class="team-logo-box animate__animated animate__zoomIn animate__faster">
                        <img id="display-team-logo" src="" alt="Team Logo" onerror="this.src='https://via.placeholder.com/120?text=LAB'">
                    </div>
                    <span id="display-team-order" class="inline-block px-4 py-1 rounded-full bg-purple-50 text-[#63489a] text-[11px] font-black mb-4 tracking-widest uppercase">-</span>
                    <h1 id="display-team-name" class="text-2xl md:text-3xl font-black mb-6 leading-tight break-keep text-gray-950">팀 로딩 중...</h1>
                    <p id="display-team-desc" class="text-sm text-gray-600 font-medium leading-relaxed mb-8 break-keep text-left bg-gray-50 p-5 rounded-xl"></p>
                    
                    <div class="flex items-center justify-center gap-6 pt-6 border-t border-gray-100">
                        <a id="display-team-email" href="#" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:text-[#63489a] hover:bg-purple-50 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="2"></path></svg>
                        </a>
                        <a id="display-team-sns" href="#" class="font-black text-xs text-gray-400 hover:text-[#63489a] transition-colors">-</a>
                    </div>
                </div>
            </aside>

            <div class="flex-grow space-y-16">
                
                <section class="bg-white p-10 rounded-[2rem] border border-gray-100/50 shadow-lg shadow-purple-950/5">
                    <div class="flex items-center justify-between mb-10 pb-4 border-b border-gray-100">
                        <h2 class="text-2xl font-black text-gray-950 flex items-center gap-2">
                            <span class="w-1 h-6 bg-[#63489a] rounded-full"></span>
                            Team Members
                        </h2>
                    </div>
                    <div id="member-list" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-8"></div>
                </section>

                <section class="bg-white p-10 rounded-[2rem] border border-gray-100/50 shadow-lg shadow-purple-950/5">
                    <div class="flex items-center justify-between mb-8 pb-4 border-b border-gray-100">
                        <h2 class="text-2xl font-black text-gray-950 flex items-center gap-2">
                            <span class="w-1 h-6 bg-[#63489a] rounded-full"></span>
                            Recent Work
                        </h2>
                        <a href="article_list.html" class="text-xs font-black text-[#63489a] hover:underline">전체보기 →</a>
                    </div>
                    <div class="text-center py-12 text-gray-400 font-medium bg-gray-50 rounded-xl">
                        준비 중인 아티클이 없습니다.
                    </div>
                </section>

            </div>

        </div>
    </main>

    <footer class="py-12 text-center text-gray-400 text-sm font-medium border-t border-gray-100 bg-white">
        <p>© 2026 SUNNY Scholar Program. All rights reserved.</p>
    </footer>

    <script src="data.js"></script>
    <script>
        function loadTeamDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const teamId = urlParams.get('id');

            if (!teamId || !TEAM_DETAILS[teamId]) {
                document.getElementById('display-team-name').innerText = "팀 정보를 찾을 수 없습니다.";
                return;
            }

            const team = TEAM_DETAILS[teamId];

            // 1. 좌측 사이드바 데이터 매핑
            if (team.teamProfileImg) {
                document.getElementById('display-team-logo').src = team.teamProfileImg;
            }
            document.getElementById('display-team-order').innerText = team.order;
            document.getElementById('display-team-name').innerText = team.name;
            document.getElementById('display-team-desc').innerText = team.description;
            
            const emailEl = document.getElementById('display-team-email');
            emailEl.href = `mailto:${team.email}`;
            
            document.getElementById('display-team-sns').innerText = team.sns;

            // 2. 우측 콘텐츠 - 팀원 리스트 동적 생성
            const memberListContainer = document.getElementById('member-list');
            const memberHTML = team.members.map(m => `
                <div class="flex flex-col items-center animate__animated animate__fadeInUp">
                    <div class="member-profile-img mb-4 shadow-lg shadow-purple-900/10 transition-transform hover:-translate-y-1">
                        <img src="${m.img}" alt="${m.name}" onerror="this.src='https://via.placeholder.com/80x110?text=SUNNY'">
                    </div>
                    <h3 class="font-black text-base text-gray-950">${m.name}</h3>
                    <p class="text-[11px] text-gray-400 font-bold uppercase tracking-wider">${m.role}</p>
                </div>
            `).join('');

            memberListContainer.innerHTML = memberHTML;
        }

        window.onload = loadTeamDetail;
    </script>
</body>
</html>
