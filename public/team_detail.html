<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; --grid-color: rgba(99, 72, 154, 0.05); }
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9ff; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 40px 40px; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .team-profile-card { background: white; border-radius: 2rem; border: 1px solid #f1f1f4; box-shadow: 0 25px 50px -12px rgba(99, 72, 154, 0.1); }
        .member-profile-img { width: 80px; height: 110px; border-radius: 100px; overflow: hidden; background: #f3f4f6; }
        .member-profile-img img { width: 100%; height: 100%; object-fit: cover; }
        @media (min-width: 1024px) { .sticky-sidebar { position: sticky; top: 6rem; max-height: calc(100vh - 8rem); overflow-y: auto; } }
        .sticky-sidebar::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
            <a href="index.html"><img src="/images/sunny_scholar_logo.png" alt="Logo" class="h-8"></a>
            <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                <a href="article_list.html">Articles</a>
                <a href="team_list.html">Lab</a>
                <a href="about.html">About</a>
            </nav>
        </div>
    </header>

    <main class="pt-24 pb-20 px-6 animate__animated animate__fadeIn">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-10 xl:gap-16">
            
            <aside class="w-full lg:w-[380px] flex-shrink-0 sticky-sidebar">
                <div class="team-profile-card overflow-hidden">
                    <div class="p-8 text-center pb-0">
                        <span id="display-team-order" class="inline-block px-4 py-1 rounded-full bg-purple-50 text-[#63489a] text-[11px] font-black mb-4 uppercase tracking-widest">-</span>
                        <h1 id="display-team-name" class="text-2xl md:text-3xl font-black mb-6 text-gray-950">로딩 중...</h1>
                    </div>
                    <div class="px-6 mb-6">
                        <div class="aspect-video rounded-2xl overflow-hidden bg-gray-100">
                            <img id="display-team-profile-img" src="" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x450?text=TEAM+PHOTO'">
                        </div>
                    </div>
                    <div class="px-8 mb-8">
                        <p id="display-team-desc" class="text-sm text-gray-600 font-medium leading-relaxed bg-gray-50 p-5 rounded-2xl"></p>
                    </div>
                    <div class="px-8 pb-8">
                        <div class="flex flex-col gap-3 pt-6 border-t border-gray-100">
                            <div class="flex items-center gap-3">
                                <a id="display-team-email" href="#" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-[#63489a]">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="2"></path></svg>
                                </a>
                                <span class="text-[10px] text-gray-400 font-bold">Email Contact</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-[#63489a]">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                </div>
                                <span id="display-team-sns" class="text-[11px] text-gray-600 font-black">-</span>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <div class="flex-grow space-y-12">
                <section class="bg-white p-10 rounded-[2rem] border border-gray-100/50 shadow-lg">
                    <h2 class="text-2xl font-black text-gray-950 mb-10 pb-4 border-b border-gray-100 flex items-center gap-2">
                        <span class="w-1 h-6 bg-[#63489a] rounded-full"></span> Team Members
                    </h2>
                    <div id="member-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6"></div>
                </section>

                <section class="bg-white p-10 rounded-[2rem] border border-gray-100/50 shadow-lg">
                    <div class="flex justify-between items-center mb-8 pb-4 border-b border-gray-100">
                        <h2 class="text-2xl font-black text-gray-950 flex items-center gap-2">
                            <span class="w-1 h-6 bg-[#63489a] rounded-full"></span> Recent Work
                        </h2>
                        <a href="article_list.html" class="text-xs font-black text-[#63489a]">전체보기 →</a>
                    </div>
                    <div id="article-list-container"></div>
                </section>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        // <script> 내부 loadTeamDetail 함수 수정

function loadTeamDetail() {
    if (typeof TEAM_DETAILS === 'undefined' || typeof SUNNY_DATA === 'undefined') {
        console.error("data.js 파일을 찾을 수 없습니다.");
        return;
    }

    const urlParams = new URLSearchParams(window.location.search);
    let teamId = urlParams.get('id') || 'fore'; 

    const team = TEAM_DETAILS[teamId];
    if (!team) return;

    // 1. 사이드바 데이터 넣기
    document.getElementById('display-team-order').innerText = team.order;
    document.getElementById('display-team-name').innerText = team.name;
    document.getElementById('display-team-desc').innerText = team.description;
    document.getElementById('display-team-email').href = `mailto:${team.email}`;
    document.getElementById('display-team-sns').innerText = team.sns;

    // [수정] team.teamProfileImg 대신 team.team_img를 사용
    const mainImg = team.team_img || team.teamProfileImg || "";
    document.getElementById('display-team-profile-img').src = mainImg;

    // 2. 멤버 리스트 출력 (onerror 이미지 차단 처리 추가)
    const memberList = document.getElementById('member-list');
    memberList.innerHTML = team.members.map(m => `
        <div class="flex flex-col items-center text-center animate__animated animate__fadeInUp">
            <div class="member-profile-img mb-4 shadow-lg shadow-purple-900/10">
                <img src="${m.img}" alt="${m.name}" 
                     onerror="this.style.opacity='0'; this.parentElement.style.backgroundColor='#eee';">
            </div>
            <h3 class="font-black text-sm text-gray-950">${m.name}</h3>
        </div>
    `).join('');

    // 3. 아티클 리스트 출력
    const teamArticles = SUNNY_DATA.filter(art => art.teamId === teamId);
    const artContainer = document.getElementById('article-list-container');
    
    if (teamArticles.length > 0) {
        artContainer.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                ${teamArticles.map(art => `
                    <a href="article_view.html?id=${art.id}" class="group block bg-gray-50 rounded-2xl overflow-hidden hover:bg-white hover:shadow-xl transition-all border border-transparent hover:border-purple-100">
                        <div class="aspect-video overflow-hidden">
                            <img src="${art.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                 onerror="this.style.opacity='0';">
                        </div>
                        <div class="p-6">
                            <div class="text-[10px] font-black text-[#63489a] mb-2 uppercase tracking-widest">${art.part}</div>
                            <h4 class="font-black text-lg group-hover:text-[#63489a] transition-colors line-clamp-1">${art.title}</h4>
                        </div>
                    </a>
                `).join('')}
            </div>`;
    } else {
        artContainer.innerHTML = `<div class="text-center py-12 text-gray-400 font-medium bg-gray-50 rounded-xl">준비 중인 아티클이 없습니다.</div>`;
    }
}
        window.onload = loadTeamDetail;
    </script>
</body>
</html>
