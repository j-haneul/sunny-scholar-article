<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; --grid-color: rgba(99, 72, 154, 0.05); }
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #fcfcff;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; letter-spacing: -0.02em;
        }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .member-chip { background: white; border: 1px solid #eee; border-radius: 14px; padding: 0.5rem 1.2rem; font-weight: 800; color: #1a1a1a; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.02); font-size: 14px; }
        .theme-bg { transition: background-color 0.5s ease; }
        /* 팀 네비게이션 버튼 호버 효과 */
        .team-nav-btn { transition: all 0.3s ease; opacity: 0.6; }
        .team-nav-btn:hover { opacity: 1; transform: translateY(-2px); }
        .team-nav-active { opacity: 1; border-bottom: 2px solid white; }
    </style>
</head>

<body>
    <header class="sticky top-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
            <a href="index.html"><img src="images/sunny_scholar_logo.png" alt="Logo" class="h-8"></a>
            <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                <a href="article_list.html" class="hover:text-[#63489a]">Articles</a>
                <a href="team_list.html" class="text-[#63489a]">Lab</a>
                <a href="about.html" class="hover:text-[#63489a]">About</a>
            </nav>
        </div>
    </header>

    <div id="quick-nav" class="theme-bg border-b border-white/10 py-3 overflow-x-auto">
        <div id="quick-nav-list" class="max-w-5xl mx-auto flex justify-center gap-6 px-6 text-[11px] font-black text-white/70 uppercase tracking-widest whitespace-nowrap">
            </div>
    </div>

    <div id="team-hero" class="theme-bg pt-12 pb-12 px-6 text-white text-center relative overflow-hidden">
        <div class="max-w-6xl mx-auto relative z-10 flex items-center justify-between">
            
            <button onclick="moveTeam(-1)" class="p-4 hover:bg-white/10 rounded-full transition-all group">
                <svg class="w-8 h-8 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
            </button>

            <div class="flex-1 px-4">
                <h1 id="display-team-name" class="text-4xl md:text-5xl font-black mb-6 tracking-tighter leading-tight animate__animated animate__fadeInDown">로딩 중...</h1>
                <div class="inline-block px-6 py-4 bg-white/10 backdrop-blur-xl rounded-[24px] border border-white/10 max-w-2xl shadow-inner animate__animated animate__fadeIn">
                    <p id="display-team-desc" class="text-base md:text-lg font-bold leading-relaxed break-keep opacity-90"></p>
                </div>
            </div>

            <button onclick="moveTeam(1)" class="p-4 hover:bg-white/10 rounded-full transition-all group">
                <svg class="w-8 h-8 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-white/5 rounded-full blur-3xl"></div>
    </div>

    <main class="py-16 px-6 max-w-6xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-24">
            <section class="bg-white p-8 md:p-10 rounded-[32px] border border-gray-100 shadow-sm flex flex-col justify-center min-h-[200px]">
                <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.3em] mb-6 text-center lg:text-left">Team Members</h2>
                <div id="member-list" class="flex flex-wrap justify-center lg:justify-start gap-3">
                    <p class="text-gray-300 text-sm italic">멤버를 불러오는 중...</p>
                </div>
            </section>

            <section class="bg-white p-8 md:p-10 rounded-[32px] border border-gray-100 shadow-sm flex flex-col justify-center items-center lg:items-start min-h-[200px]">
                <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.3em] mb-6">Connect with Us</h2>
                <div id="contact-container" class="flex flex-wrap justify-center lg:justify-start gap-3 w-full">
                    <p class="text-gray-300 text-sm italic">연락처를 불러오는 중...</p>
                </div>
            </section>
        </div>

        <section>
            <div class="flex items-center justify-between mb-10 px-2">
                <div>
                    <h2 class="text-3xl font-black text-gray-950 tracking-tight">Team Articles</h2>
                </div>
                <a href="article_list.html" class="px-5 py-2 rounded-full border border-gray-200 text-[11px] font-black text-gray-500 hover:border-[#63489a] hover:text-[#63489a] transition-all bg-white">전체보기</a>
            </div>
            <div id="article-list-container"></div>
        </section>
    </main>

    <script src="data.js"></script>
    <script>
        let currentTeamId = "";
        let teamIds = [];

        function initTeamDetail() {
            const params = new URLSearchParams(window.location.search);
            currentTeamId = params.get('teamId');
            
            // 데이터 소스 통합 확인
            const sourceData = typeof TEAM_DATA !== 'undefined' ? TEAM_DATA : (typeof TEAM_DETAILS !== 'undefined' ? TEAM_DETAILS : null);

            if (!sourceData) {
                alert("데이터 파일(data.js)을 불러올 수 없습니다.");
                return;
            }

            teamIds = Object.keys(sourceData);
            if (!currentTeamId) currentTeamId = teamIds[0];

            const team = sourceData[currentTeamId];
            if (!team) {
                alert("해당 팀 정보를 찾을 수 없습니다.");
                return;
            }

            const mainColor = team.theme?.main || '#63489a';

            // 1. 테마 및 상단 내비게이션 렌더링
            document.querySelectorAll('.theme-bg').forEach(el => el.style.backgroundColor = mainColor);
            renderQuickNav(sourceData);

            // 2. 기본 정보
            document.getElementById('display-team-name').innerText = team.teamName || team.name;
            document.getElementById('display-team-desc').innerText = team.summary || "소개 문구가 없습니다.";

            // 3. 팀원 리스트 (데이터 구조에 따라 members 또는 memberName 확인)
            const memberList = document.getElementById('member-list');
            const members = team.members || team.memberList || [];
            if (members.length > 0) {
                memberList.innerHTML = members.map(m => `
                    <div class="member-chip animate__animated animate__fadeInUp">${m.name || m}</div>
                `).join('');
            } else {
                memberList.innerHTML = '<p class="text-gray-400 text-sm">등록된 팀원이 없습니다.</p>';
            }

            // 4. 컨택 포인트
            const contactContainer = document.getElementById('contact-container');
            const contacts = [];
            if (team.email) contacts.push({ type: 'Email', link: `mailto:${team.email}`, color: 'bg-gray-900' });
            if (team.instagram) contacts.push({ type: 'Instagram', link: team.instagram, color: 'bg-gradient-to-tr from-orange-400 via-red-500 to-purple-600' });
            if (team.blog) contacts.push({ type: 'Blog', link: team.blog, color: 'bg-[#03C75A]' });

            if (contacts.length > 0) {
                contactContainer.innerHTML = contacts.map(c => `
                    <a href="${c.link}" target="_blank" class="flex-1 min-w-[100px] text-center px-4 py-3 ${c.color} text-white rounded-xl font-bold text-[12px] hover:scale-105 transition-all shadow-sm">
                        ${c.type}
                    </a>
                `).join('');
            } else {
                contactContainer.innerHTML = '<p class="text-gray-400 text-sm">등록된 연락처가 없습니다.</p>';
            }

            renderTeamArticles(currentTeamId);
        }

        // 퀵 내비게이션 렌더링
        function renderQuickNav(data) {
            const nav = document.getElementById('quick-nav-list');
            nav.innerHTML = Object.entries(data).map(([id, team]) => `
                <a href="team_detail.html?teamId=${id}" class="team-nav-btn ${id === currentTeamId ? 'team-nav-active' : ''}">
                    ${team.teamName || team.name}
                </a>
            `).join('');
        }

        // 좌우 이동 함수
        function moveTeam(direction) {
            const currentIndex = teamIds.indexOf(currentTeamId);
            let nextIndex = currentIndex + direction;

            if (nextIndex < 0) nextIndex = teamIds.length - 1;
            if (nextIndex >= teamIds.length) nextIndex = 0;

            window.location.href = `team_detail.html?teamId=${teamIds[nextIndex]}`;
        }

        function renderTeamArticles(teamId) {
            if (typeof SUNNY_DATA === 'undefined') return;
            const teamArticles = SUNNY_DATA.filter(art => art.teamId === teamId);
            const container = document.getElementById('article-list-container');

            if (teamArticles.length > 0) {
                container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    ${teamArticles.map(art => `
                        <a href="article_view.html?id=${art.id}" class="group block bg-white rounded-[32px] p-4 border border-transparent hover:border-gray-100 hover:shadow-xl transition-all duration-500">
                            <div class="aspect-[16/10] rounded-[24px] overflow-hidden mb-5"><img src="${art.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"></div>
                            <div class="px-2">
                                <span class="text-[10px] font-black text-[#63489a] uppercase tracking-widest bg-purple-50 px-2 py-1 rounded-md mb-3 inline-block">${art.part}</span>
                                <h4 class="font-black text-xl text-gray-900 group-hover:text-[#63489a] transition-colors leading-snug break-keep">${art.title}</h4>
                            </div>
                        </a>
                    `).join('')}</div>`;
            } else {
                container.innerHTML = `<div class="text-center py-20 text-gray-400 font-bold bg-white border border-dashed border-gray-200 rounded-[32px] text-sm">등록된 아티클이 아직 없습니다.</div>`;
            }
        }

        window.onload = initTeamDetail;
    </script>
</body>
</html>
