<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; --grid-color: rgba(99, 72, 154, 0.05); }
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #fcfcff;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; letter-spacing: -0.02em;
        }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .member-chip { background: white; border: 1px solid #eee; border-radius: 14px; padding: 0.5rem 1.2rem; font-weight: 800; color: #1a1a1a; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.02); font-size: 14px; }
        .member-chip:hover { transform: translateY(-2px); border-color: #ddd; }
        .theme-bg { transition: background-color 0.5s ease; }
    </style>
</head>

<body>
    <header class="sticky top-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
            <a href="index.html"><img src="images/sunny_scholar_logo.png" alt="Logo" class="h-8"></a>
            <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                <a href="article_list.html" class="hover:text-[#63489a]">Articles</a>
                <a href="team_list.html" class="text-[#63489a]">Lab</a>
                <a href="about.html" class="hover:text-[#63489a]">About</a>
            </nav>
        </div>
    </header>

    <div id="team-hero" class="theme-bg pt-16 pb-12 px-6 text-white text-center relative overflow-hidden">
        <div class="max-w-5xl mx-auto relative z-10">
            <h1 id="display-team-name" class="text-4xl md:text-6xl font-black mb-6 tracking-tighter leading-tight">로딩 중...</h1>
            <div class="inline-block px-6 py-4 bg-white/10 backdrop-blur-xl rounded-[24px] border border-white/10 max-w-2xl shadow-inner">
                <p id="display-team-desc" class="text-base md:text-lg font-bold leading-relaxed break-keep opacity-90"></p>
            </div>
        </div>
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-white/5 rounded-full blur-3xl"></div>
    </div>

    <main class="py-16 px-6 max-w-6xl mx-auto">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-24">
            
            <section class="bg-white p-8 md:p-10 rounded-[32px] border border-gray-100 shadow-sm flex flex-col justify-center">
                <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.3em] mb-6 text-center lg:text-left">Team Members</h2>
                <div id="member-list" class="flex flex-wrap justify-center lg:justify-start gap-3"></div>
            </section>

            <section class="bg-white p-8 md:p-10 rounded-[32px] border border-gray-100 shadow-sm flex flex-col justify-center items-center lg:items-start">
                <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.3em] mb-6">Connect with Us</h2>
                <div id="contact-container" class="flex flex-wrap justify-center lg:justify-start gap-3 w-full">
                    </div>
            </section>
        </div>

        <section>
            <div class="flex items-center justify-between mb-10 px-2">
                <div>
                    <h2 class="text-3xl font-black text-gray-950 tracking-tight">Team Articles</h2>
                    <p class="text-gray-500 text-sm mt-1">이 팀이 기록한 변화의 목소리</p>
                </div>
                <a href="article_list.html" class="px-5 py-2 rounded-full border border-gray-200 text-[11px] font-black text-gray-500 hover:border-[#63489a] hover:text-[#63489a] transition-all bg-white">전체보기</a>
            </div>
            <div id="article-list-container"></div>
        </section>
    </main>

    <script src="data.js"></script>
    <script>
        function initTeamDetail() {
            const params = new URLSearchParams(window.location.search);
            const teamId = params.get('teamId');
            const sourceData = typeof TEAM_DATA !== 'undefined' ? TEAM_DATA : (typeof TEAM_DETAILS !== 'undefined' ? TEAM_DETAILS : null);

            if (!sourceData || !teamId || !sourceData[teamId]) {
                alert("팀 정보를 찾을 수 없습니다.");
                return;
            }

            const team = sourceData[teamId];
            const mainColor = team.theme?.main || '#63489a';

            // 1. 테마 적용 및 배지 제거된 헤더 정보 적용
            document.getElementById('team-hero').style.backgroundColor = mainColor;
            document.getElementById('display-team-name').innerText = team.teamName || team.name;
            document.getElementById('display-team-desc').innerText = team.summary;

            // 2. 팀원 리스트 (좌측 섹션)
            const memberList = document.getElementById('member-list');
            if (team.members) {
                memberList.innerHTML = team.members.map(m => `
                    <div class="member-chip animate__animated animate__fadeInUp">${m.name}</div>
                `).join('');
            }

            // 3. 컨택 포인트 (우측 섹션) - 버튼 크기 컴팩트하게 조정
            const contactContainer = document.getElementById('contact-container');
            const contacts = [];
            if (team.email) contacts.push({ type: 'Email', link: `mailto:${team.email}`, color: 'bg-gray-900' });
            if (team.instagram) contacts.push({ type: 'Instagram', link: team.instagram, color: 'bg-gradient-to-tr from-orange-400 via-red-500 to-purple-600' });
            if (team.blog) contacts.push({ type: 'Blog', link: team.blog, color: 'bg-[#03C75A]' });

            contactContainer.innerHTML = contacts.map(c => `
                <a href="${c.link}" target="_blank" class="flex-1 min-w-[120px] text-center px-4 py-3 ${c.color} text-white rounded-xl font-bold text-[13px] hover:brightness-110 transition-all shadow-sm">
                    ${c.type}
                </a>
            `).join('') || '<p class="text-gray-400">등록된 연락처가 없습니다.</p>';

            renderTeamArticles(teamId);
        }

        function renderTeamArticles(teamId) {
            if (typeof SUNNY_DATA === 'undefined') return;
            const teamArticles = SUNNY_DATA.filter(art => art.teamId === teamId);
            const container = document.getElementById('article-list-container');

            if (teamArticles.length > 0) {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        ${teamArticles.map(art => `
                            <a href="article_view.html?id=${art.id}" class="group block bg-white rounded-[32px] p-4 border border-transparent hover:border-gray-100 hover:shadow-xl transition-all duration-500">
                                <div class="aspect-[16/10] rounded-[24px] overflow-hidden mb-5">
                                    <img src="${art.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                                </div>
                                <div class="px-2">
                                    <span class="text-[10px] font-black text-[#63489a] uppercase tracking-widest bg-purple-50 px-2 py-1 rounded-md mb-3 inline-block">${art.part}</span>
                                    <h4 class="font-black text-xl text-gray-900 group-hover:text-[#63489a] transition-colors leading-snug break-keep">${art.title}</h4>
                                </div>
                            </a>
                        `).join('')}
                    </div>`;
            } else {
                container.innerHTML = `<div class="text-center py-20 text-gray-400 font-bold bg-white border border-dashed border-gray-200 rounded-[32px] text-sm">등록된 아티클이 아직 없습니다.</div>`;
            }
        }

        window.onload = initTeamDetail;
    </script>
</body>
</html>
