<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { 
            --sunny-purple: #63489a; 
            --sunny-gradient: linear-gradient(135deg, #4f319b 0%, #8c52ff 100%);
            --grid-color: rgba(99, 72, 154, 0.05);
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8f9ff; 
            color: #1a1a1a; 
            letter-spacing: -0.01em;
            background-image: 
                linear-gradient(to bottom, rgba(99, 72, 154, 0.05) 0%, transparent 15%),
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }

        .team-profile-card {
            background: white;
            border-radius: 2rem;
            border: 1px solid #f1f1f4;
            box-shadow: 0 25px 50px -12px rgba(99, 72, 154, 0.1);
        }
        
        .member-profile-img {
            width: 80px;
            height: 110px;
            border-radius: 100px;
            overflow: hidden;
            background: #f3f4f6;
        }
        .member-profile-img img { width: 100%; height: 100%; object-fit: cover; }

        @media (min-width: 1024px) {
            .sticky-sidebar {
                position: sticky;
                top: 6rem;
                max-height: calc(100vh - 8rem);
                overflow-y: auto;
            }
        }

        /* 스크롤바 숨기기 (선택 사항) */
        .sticky-sidebar::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-14 md:h-16">
                <a href="index.html" class="flex items-center">
                    <img src="/images/sunny_scholar_logo.png" alt="Logo" class="h-7 md:h-8 w-auto">
                </a>
                <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                    <a href="article_list.html" class="nav-link text-gray-800 hover:text-sunny transition">Articles</a>
                    <a href="team_list.html" class="nav-link text-gray-800 hover:text-sunny transition">Lab</a>
                    <a href="about.html" class="nav-link text-gray-800 hover:text-sunny transition">About</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-20 px-6 animate__animated animate__fadeIn">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-10 xl:gap-16">
            
            <aside class="w-full lg:w-[380px] xl:w-[420px] flex-shrink-0 sticky-sidebar">
                <div class="team-profile-card overflow-hidden">
                    <div class="p-8 text-center pb-0">
                        <span id="display-team-order" class="inline-block px-4 py-1 rounded-full bg-purple-50 text-[#63489a] text-[11px] font-black mb-4 tracking-widest uppercase">-</span>
                        <h1 id="display-team-name" class="text-2xl md:text-3xl font-black mb-6 leading-tight break-keep text-gray-950">로딩 중...</h1>
                    </div>

                    <div class="px-6 mb-6">
                        <div class="aspect-video rounded-2xl overflow-hidden bg-gray-100 shadow-inner">
                            <img id="display-team-profile-img" src="" alt="Team Group" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x450?text=SUNNY+LAB+TEAM'">
                        </div>
                    </div>

                    <div class="px-8 mb-8">
                        <p id="display-team-desc" class="text-sm text-gray-600 font-medium leading-relaxed break-keep bg-gray-50 p-5 rounded-2xl"></p>
                    </div>

                    <div class="px-8 pb-8">
                        <div class="flex flex-col gap-3 pt-6 border-t border-gray-100 text-sm font-bold text-gray-400 uppercase tracking-tighter">
                            <div class="flex items-center gap-3">
                                <a id="display-team-email" href="#" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-[#63489a] hover:bg-purple-50 transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="2"></path></svg>
                                </a>
                                <span class="text-[10px] text-gray-400">Email Contact</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-[#63489a]">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                </div>
                                <span id="display-team-sns" class="text-[11px] text-gray-600 font-black">-</span>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <div class="flex-grow space-y-12">
                <section class="bg-white p-10 rounded-[2rem] border border-gray-100/50 shadow-lg shadow-purple-950/5">
                    <div class="flex items-center justify-between mb-10 pb-4 border-b border-gray-100">
                        <h2 class="text-2xl font-black text-gray-950 flex items-center gap-2">
                            <span class="w-1 h-6 bg-[#63489a] rounded-full"></span>
                            Team Members
                        </h2>
                    </div>
                    <div id="member-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6"></div>
                </section>

                <section class="bg-white p-10 rounded-[2rem] border border-gray-100/50 shadow-lg shadow-purple-950/5">
                    <div class="flex items-center justify-between mb-8 pb-4 border-b border-gray-100">
                        <h2 class="text-2xl font-black text-gray-950 flex items-center gap-2">
                            <span class="w-1 h-6 bg-[#63489a] rounded-full"></span>
                            Recent Work
                        </h2>
                        <a href="article_list.html" class="text-xs font-black text-[#63489a] hover:underline">전체보기 →</a>
                    </div>
                    <div id="article-list-container" class="text-center py-12 text-gray-400 font-medium bg-gray-50 rounded-xl">
                        준비 중인 아티클이 없습니다.
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-400 text-sm font-medium border-t border-gray-100 bg-white mt-20">
        <p>© 2026 SUNNY Scholar Program. All rights reserved.</p>
    </footer>

    <script src="data.js"></script>
    <script>
        function loadTeamDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const teamId = urlParams.get('id');

            if (typeof TEAM_DETAILS === 'undefined' || typeof SUNNY_DATA === 'undefined') return;
            if (!teamId || !TEAM_DETAILS[teamId]) return;

            const team = TEAM_DETAILS[teamId];

            // 사이드바 매핑
            document.getElementById('display-team-order').innerText = team.order;
            document.getElementById('display-team-name').innerText = team.name;
            document.getElementById('display-team-desc').innerText = team.description;
            document.getElementById('display-team-email').href = `mailto:${team.email}`;
            document.getElementById('display-team-sns').innerText = team.sns;
            
            const profileImg = document.getElementById('display-team-profile-img');
            if (profileImg) profileImg.src = team.teamProfileImg || team.teamImg;

            // 팀원 리스트 (5열 레이아웃)
            const memberListContainer = document.getElementById('member-list');
            if (memberListContainer && team.members) {
                memberListContainer.innerHTML = team.members.map(m => `
                    <div class="flex flex-col items-center animate__animated animate__fadeInUp text-center">
                        <div class="member-profile-img mb-4 shadow-lg shadow-purple-900/10 transition-transform hover:-translate-y-1">
                            <img src="${m.img}" alt="${m.name}" onerror="this.src='https://via.placeholder.com/80x110?text=SUNNY'">
                        </div>
                        <h3 class="font-black text-sm md:text-base text-gray-950">${m.name}</h3>
                    </div>
                `).join('');
            }

            renderTeamArticles(teamId);
        }

        function renderTeamArticles(teamId) {
            const teamArticles = SUNNY_DATA.filter(art => art.teamId === teamId);
            const container = document.getElementById('article-list-container');
            if (container && teamArticles.length > 0) {
                container.classList.remove('text-center', 'py-12', 'text-gray-400', 'bg-gray-50');
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                        ${teamArticles.map(art => `
                            <a href="article_view.html?id=${art.id}" class="group block bg-gray-50 rounded-2xl overflow-hidden hover:bg-white hover:shadow-xl transition-all border border-transparent hover:border-purple-100">
                                <div class="aspect-video overflow-hidden">
                                    <img src="${art.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400x225?text=SUNNY+ARTICLE'">
                                </div>
                                <div class="p-6">
                                    <div class="text-[10px] font-black text-[#63489a] mb-2 uppercase tracking-widest">${art.part}</div>
                                    <h4 class="font-black text-lg group-hover:text-[#63489a] transition-colors line-clamp-1">${art.title}</h4>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                `;
            }
        }
        window.onload = loadTeamDetail;
    </script>
</body>
</html>
