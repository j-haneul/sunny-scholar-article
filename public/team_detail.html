<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; --grid-color: rgba(99, 72, 154, 0.05); }
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #f8f9ff;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; letter-spacing: -0.02em;
        }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .contact-card { background: white; border: 2px solid var(--sunny-purple); border-radius: 1.5rem; transition: all 0.3s ease; }
        .member-chip { background: white; border: 1px solid #e2e8f0; border-radius: 99px; padding: 0.5rem 1.5rem; font-weight: 700; color: #1a1a1a; transition: all 0.2s; }
        .member-chip:hover { border-color: var(--sunny-purple); color: var(--sunny-purple); }
    </style>
</head>

<body>
    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
            <a href="index.html"><img src="/images/sunny_scholar_logo.png" alt="Logo" class="h-8"></a>
            <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                <a href="article_list.html" class="hover:text-[#63489a]">Articles</a>
                <a href="team_list.html" class="text-[#63489a]">Lab</a>
                <a href="about.html" class="hover:text-[#63489a]">About</a>
            </nav>
        </div>
    </header>

    <main class="pt-20 pb-24 px-6 max-w-5xl mx-auto animate__animated animate__fadeIn">
        <section class="text-center mb-20">
            <span id="display-team-order" class="inline-block px-4 py-1 rounded-full bg-purple-50 text-[#63489a] text-[11px] font-black mb-6 uppercase tracking-widest">-</span>
            <h1 id="display-team-name" class="text-4xl md:text-6xl font-black text-gray-950 mb-10 leading-tight">로딩 중...</h1>
            <div class="max-w-3xl mx-auto">
                <p id="display-team-desc" class="text-lg md:text-xl text-gray-600 font-medium leading-relaxed break-keep"></p>
            </div>
        </section>

        <section class="mb-20 text-center">
            <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em] mb-8">Team Members</h2>
            <div id="member-list" class="flex flex-wrap justify-center gap-3"></div>
        </section>

        <section class="mb-24">
            <div class="contact-card p-8 md:p-12 flex flex-col md:flex-row items-center justify-between gap-8 shadow-xl shadow-purple-900/5">
                <div class="text-center md:text-left">
                    <h3 class="text-2xl font-black text-gray-950 mb-2">우리 팀과 연결되기</h3>
                    <p class="text-gray-500 font-medium">프로젝트 협업 및 궁금한 점은 언제든 환영합니다.</p>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                    <a id="display-team-email" href="#" class="flex items-center justify-center gap-3 px-8 py-4 bg-[#63489a] text-white rounded-xl font-black text-sm hover:bg-[#4f319b] transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="2"></path></svg>
                        Email Contact
                    </a>
                    <div class="flex items-center justify-center gap-3 px-8 py-4 bg-gray-100 text-gray-700 rounded-xl font-black text-sm">
                        <span id="display-team-sns">-</span>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-10">
                <h2 class="text-3xl font-black text-gray-950">Recent Work</h2>
                <a href="article_list.html" class="text-xs font-black text-[#63489a] border-b-2 border-[#63489a]">전체보기</a>
            </div>
            <div id="article-list-container"></div>
        </section>
    </main>

    <script src="data.js"></script>
    <script>
        function loadTeamDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const teamId = urlParams.get('id');

            if (typeof TEAM_DETAILS === 'undefined' || !teamId || !TEAM_DETAILS[teamId]) return;

            const team = TEAM_DETAILS[teamId];

            // 데이터 매핑
            document.getElementById('display-team-order').innerText = team.order;
            document.getElementById('display-team-name').innerText = team.name;
            document.getElementById('display-team-desc').innerText = team.description;
            document.getElementById('display-team-email').href = `mailto:${team.email}`;
            document.getElementById('display-team-sns').innerText = team.sns;

            // 멤버 리스트 (이름만 칩 형태로)
            const memberList = document.getElementById('member-list');
            memberList.innerHTML = team.members.map(m => `
                <div class="member-chip animate__animated animate__fadeInUp">${m.name}</div>
            `).join('');

            renderTeamArticles(teamId);
        }

        function renderTeamArticles(teamId) {
            const teamArticles = SUNNY_DATA.filter(art => art.teamId === teamId);
            const container = document.getElementById('article-list-container');

            if (teamArticles.length > 0) {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        ${teamArticles.map(art => `
                            <a href="article_view.html?id=${art.id}" class="group block">
                                <div class="aspect-video rounded-3xl overflow-hidden mb-6 shadow-lg">
                                    <img src="${art.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400x225?text=SUNNY'">
                                </div>
                                <div class="text-[10px] font-black text-[#63489a] mb-2 uppercase tracking-widest">${art.part}</div>
                                <h4 class="font-black text-xl text-gray-950 group-hover:text-[#63489a] transition-colors">${art.title}</h4>
                            </a>
                        `).join('')}
                    </div>`;
            } else {
                container.innerHTML = `<div class="text-center py-20 text-gray-400 font-bold bg-gray-50 rounded-3xl text-sm">준비된 아티클이 없습니다.</div>`;
            }
        }

        window.onload = loadTeamDetail;
    </script>
</body>
</html>
