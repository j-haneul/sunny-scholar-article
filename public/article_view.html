<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article View | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9ff; line-height: 1.8; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
        .part-tab { transition: all 0.3s ease; border-radius: 99px; padding: 6px 16px; white-space: nowrap; font-size: 11px; font-weight: 800; color: #9ca3af; border: 1px solid #eee; }
        .part-tab.active { background: var(--sunny-purple); color: white; border-color: var(--sunny-purple); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bottom-nav-card { transition: all 0.3s ease; border: 1px solid #eee; background: white; padding: 1.5rem; border-radius: 1rem; display: flex; flex-direction: column; }
        .bottom-nav-card:hover { border-color: var(--sunny-purple); transform: translateY(-4px); }
        
        .content-text { color: #374151; font-size: 1.125rem; word-break: keep-all; text-align: justify; }
        .content-text p { margin-bottom: 2rem; }

        .content-img { width: 100%; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: block; object-fit: cover; }
        .img-container { margin-top: 2.5rem; margin-bottom: 2.5rem; }
        .img-caption { text-align: center; font-size: 13px; color: #94a3b8; margin-top: 1rem; font-weight: 500; word-break: keep-all; }
        
        /* 프로그레스 바: 헤더 위에 독립적으로 고정 */
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 100; }
        .progress-bar { height: 100%; background: var(--sunny-purple); width: 0%; transition: width 0.1s ease; }

        /* 헤더 애니메이션 */
        header { transition: transform 0.4s ease-in-out; will-change: transform; }
        .header-hidden { transform: translateY(-100%); }

        /* 서브 네비게이션 애니메이션 */
        .sticky-nav { transition: all 0.4s ease-in-out; }
        .nav-up { top: 0 !important; }
    </style>
</head>
