        /* 제목 크기 및 간격 미세 조정 */
#view-title {
    word-break: keep-all;
    letter-spacing: -0.02em;
}

/* 모바일에서 파트 네비게이션이 너무 붙지 않게 */
#part-nav {
    -ms-overflow-style: none; /* IE and Edge */
    scrollbar-width: none; /* Firefox */
}

/* 상단 네비게이션 숨김 애니메이션 시 서브 네비게이션 위치 조정 */
.nav-up {
    top: 0 !important;
}

        /* --- index.html 기준 상단바 레이아웃 강제 통일 --- */
header { 
    height: 64px !important; 
    position: sticky !important;
    top: 0 !important;
    z-index: 50 !important;
    background: rgba(255, 255, 255, 0.8) !important; 
    backdrop-filter: blur(12px) !important; 
    -webkit-backdrop-filter: blur(12px) !important; 
    border-bottom: 1px solid rgba(0, 0, 0, 0.05) !important;
    width: 100% !important;
    display: block !important; /* 혹시 모를 밀림 방지 */
}

.header-container {
    max-width: 80rem !important; /* index.html의 max-w-7xl 설정값 */
    margin: 0 auto !important;
    padding: 0 1.5rem !important; /* index.html의 px-6 설정값 */
    height: 100% !important;
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
    box-sizing: border-box !important;
}

/* 로고 크기 인덱스와 동일하게 32px 고정 */
.header-container a img {
    height: 32px !important;
    width: auto !important;
}

/* 메뉴 텍스트 및 인덱스 스타일 밑줄 */
.nav-link {
    position: relative !important;
    height: 64px !important;
    display: flex !important;
    align-items: center !important;
    color: #1f2937 !important;
    font-size: 11px !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
    transition: color 0.3s ease !important;
}

.nav-link::after {
    content: '' !important;
    position: absolute !important;
    bottom: 18px !important;
    left: 50% !important;
    width: 0 !important;
    height: 2px !important;
    background-color: #63489a !important;
    transition: all 0.3s ease !important;
    transform: translateX(-50%) !important;
}

.nav-link:hover::after,
.nav-link.active-tab::after {
    width: 100% !important;
}

.nav-link.active-tab {
    color: #63489a !important;
}
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9ff; line-height: 1.8; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
        
        /* 탭 스타일 */
        .part-tab { transition: all 0.3s ease; border-radius: 99px; padding: 6px 16px; white-space: nowrap; font-size: 11px; font-weight: 800; color: #9ca3af; border: 1px solid #eee; }
        .part-tab.active { background: var(--sunny-purple); color: white; border-color: var(--sunny-purple); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* [복구] 아티클 본문 및 폰트 스타일 */
        .content-text { color: #374151; font-size: 1.125rem; word-break: keep-all; text-align: justify; }
        .content-text p { margin-bottom: 2rem; } /* 문단 간격 예전 스타일로 유지 */
        
        /* 이미지 및 캡션 */
        .content-img { width: 100%; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: block; object-fit: cover; }
        .img-container { margin-top: 2.5rem; margin-bottom: 2.5rem; }
        .img-caption { text-align: center; font-size: 13px; color: #94a3b8; margin-top: 1rem; font-weight: 500; word-break: keep-all; }

        /* [복구] 각주(Footnote) 섹션 스타일 */
        .footnote-section { margin-top: 4rem; padding-top: 2rem; border-top: 1px dashed #e2e8f0; }
        .footnote-section p { font-size: 13px !important; color: #94a3b8 !important; margin-bottom: 0.5rem !important; line-height: 1.5 !important; text-align: left !important; }

        /* 하단 네비게이션 카드 */
        .bottom-nav-card { transition: all 0.3s ease; border: 1px solid #eee; background: white; padding: 1.5rem; border-radius: 1rem; display: flex; flex-direction: column; }
        .bottom-nav-card:hover { border-color: var(--sunny-purple); transform: translateY(-4px); }

        /* 현재 기능: 프로그레스 바 & 애니메이션 */
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 100; }
        .progress-bar { height: 100%; background: var(--sunny-purple); width: 0%; transition: width 0.1s ease; }
        header { transition: transform 0.4s ease-in-out; will-change: transform; }
        .header-hidden { transform: translateY(-100%); }
        .sticky-nav { transition: all 0.4s ease-in-out; }
        .nav-up { top: 0 !important; }
    </style>

    <script src="data.js"></script>
    <script>
        function initView() {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (typeof SUNNY_DATA === 'undefined' || !articleId) return;
            const current = SUNNY_DATA.find(a => a.id === articleId);
            if (!current) return;

            // 데이터 매핑
            const teamBase = (typeof TEAM_DATA !== 'undefined' ? TEAM_DATA[current.teamId] : {}) || {};
            const teamInfo = (typeof TEAM_DETAILS !== 'undefined' ? TEAM_DETAILS[current.teamId] : {}) || {};

            // 1. 헤더/제목 설정
            document.getElementById('view-team-tag').innerText = teamBase.teamName || current.teamName;
            document.getElementById('view-team-summary').innerText = teamBase.summary || "";
            document.getElementById('view-title').innerText = current.title;

            // 2. 본문 렌더링 (썸네일 포함)
            const dynamicBody = document.getElementById('dynamic-body');
            let articleContent = current.content || "";
            if (current.thumbnail) {
                articleContent = `
                    <div class="img-container">
                        <img src="${current.thumbnail}" class="content-img">
                        ${current.thumbnailCaption ? `<p class="img-caption">▲ ${current.thumbnailCaption}</p>` : ''}
                    </div>
                ` + articleContent;
            }
            dynamicBody.innerHTML = articleContent;

            // 3. 각주 처리 (데이터에 footnotes가 배열로 있을 경우)
            const footnoteArea = document.getElementById('footnote-area');
            if (current.footnotes && current.footnotes.length > 0) {
                footnoteArea.classList.remove('hidden');
                footnoteArea.innerHTML = current.footnotes.map(fn => `<p>${fn}</p>`).join('');
            }

            // 4. 팀 정보 푸터
            document.getElementById('team-link').href = `team_detail.html?teamId=${current.teamId}`;
            document.getElementById('contact-team-name').innerText = teamBase.teamName || current.teamName;
            document.getElementById('team-cta').innerText = teamInfo.cta || teamInfo.description || "사회문제의 본질을 연구합니다.";
            
            const emailAddr = teamInfo.email || "sunny@sk.com";
            const emailLink = document.getElementById('contact-email-link');
            emailLink.innerText = emailAddr;
            emailLink.href = `mailto:${emailAddr}`;

            // 5. 파트 네비게이션
            const teamArticles = SUNNY_DATA.filter(a => a.teamId === current.teamId);
            document.getElementById('part-nav').innerHTML = teamArticles.map(art => `
                <a href="article_view.html?id=${art.id}" class="part-tab ${art.id === articleId ? 'active' : ''}">
                    ${art.part}
                </a>
            `).join('');

            // 6. 이전/다음 글
            const idx = teamArticles.findIndex(a => a.id === articleId);
            if (idx > 0) {
                const el = document.getElementById('prev-article');
                el.classList.remove('invisible');
                el.querySelector('a').href = `article_view.html?id=${teamArticles[idx-1].id}`;
                el.querySelector('span:last-child').innerText = teamArticles[idx-1].title;
            }
            if (idx < teamArticles.length - 1) {
                const el = document.getElementById('next-article');
                el.classList.remove('invisible');
                el.querySelector('a').href = `article_view.html?id=${teamArticles[idx+1].id}`;
                el.querySelector('span:last-child').innerText = teamArticles[idx+1].title;
            }
        }

        function copyURL() {
            navigator.clipboard.writeText(window.location.href);
            alert("주소가 복사되었습니다!");
        }

        // 스크롤 인터랙션
        let lastScrollTop = 0;
        function handleScroll() {
            const header = document.querySelector('header');
            const subNav = document.getElementById('sub-nav-container');
            const indicator = document.getElementById("scroll-indicator");
            let st = window.pageYOffset || document.documentElement.scrollTop;

            // 프로그레스 바
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            if(indicator) indicator.style.width = (st / height) * 100 + "%";

            // 헤더 숨기기/보여주기
            if (st > lastScrollTop && st > 100) {
                header.classList.add('header-hidden');
                subNav.classList.add('nav-up');
            } else {
                header.classList.remove('header-hidden');
                subNav.classList.remove('nav-up');
            }
            lastScrollTop = st <= 0 ? 0 : st;
        }
document.addEventListener('DOMContentLoaded', () => {
    const menuBtn = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuIconPath = document.getElementById('menu-icon-path');

    // SUNNY 브랜드 컬러 변수
    const sunnyPurple = getComputedStyle(document.documentElement).getPropertyValue('--sunny-purple').trim() || '#63489a';
    const sunnyDeepPurple = '#4e387a'; // 선택 시 더 진한 색상

    menuBtn.addEventListener('click', () => {
        const isHidden = mobileMenu.classList.toggle('hidden');
        
        if (isHidden) {
            // 닫힘 상태: 기본 보라색 + 햄버거 아이콘
            menuBtn.style.color = sunnyPurple;
            menuIconPath.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
        } else {
            // 열림 상태: 진한 보라색 + X 아이콘
            menuBtn.style.color = sunnyDeepPurple;
            menuIconPath.setAttribute('d', 'M6 18L18 6M6 6l12 12');
        }
    });

    // 바깥 영역 클릭 시 자동 닫기 및 색상 복구
    window.addEventListener('click', (e) => {
        if (!menuBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
            if (!mobileMenu.classList.contains('hidden')) {
                mobileMenu.classList.add('hidden');
                menuBtn.style.color = sunnyPurple;
                menuIconPath.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
            }
        }
    });
});
        window.addEventListener('load', initView);
        window.addEventListener('scroll', handleScroll);
    </script>
