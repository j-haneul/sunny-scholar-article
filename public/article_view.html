<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article View | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9ff; line-height: 1.8; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
        .part-tab { transition: all 0.3s ease; border-radius: 99px; padding: 6px 16px; white-space: nowrap; font-size: 11px; font-weight: 800; color: #9ca3af; border: 1px solid #eee; }
        .part-tab.active { background: var(--sunny-purple); color: white; border-color: var(--sunny-purple); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bottom-nav-card { transition: all 0.3s ease; border: 1px solid #eee; background: white; padding: 1.5rem; border-radius: 1rem; display: flex; flex-direction: column; }
        .bottom-nav-card:hover { border-color: var(--sunny-purple); transform: translateY(-4px); }
        
        .content-text { color: #374151; font-size: 1.125rem; word-break: keep-all; text-align: justify; }
        .content-text p { margin-bottom: 2rem; }

        /* 이미지 스타일 통일 */
        .content-img { 
            width: 100%; 
            border-radius: 1.5rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            display: block; 
            object-fit: cover; 
        }
        .img-container { margin-top: 2.5rem; margin-bottom: 2.5rem; }
        .img-caption { text-align: center; font-size: 13px; color: #94a3b8; margin-top: 1rem; font-weight: 500; word-break: keep-all; }
        
        .contact-box { background: white; border-radius: 1.5rem; border: 1px solid #f1f5f9; padding: 2rem; text-align: center; margin-top: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    
    
    /* 각주 섹션 스타일 */
.footnote-section {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px dashed #e2e8f0;
}

.footnote-section p {
    font-size: 13px !important;
    color: #94a3b8 !important;
    margin-bottom: 0.5rem !important;
    line-height: 1.5 !important;
}

/* 본문 내 위첨자 스타일 */
sup {
    font-size: 10px;
    color: var(--sunny-purple);
    font-weight: 700;
    margin-left: 2px;
}
    
    </style>
</head>
<body class="text-gray-900">
    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-14 md:h-16">
                <a href="index.html" class="flex items-center">
                    <img src="/images/sunny_scholar_logo.png" alt="Logo" class="h-7 md:h-8 w-auto">
                </a>
                <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                    <a href="article_list.html" class="nav-link text-gray-800 hover:text-sunny transition">Articles</a>
                    <a href="team_list.html" class="nav-link text-gray-800 hover:text-sunny transition">Lab</a>
                    <a href="about.html" class="nav-link text-gray-800 hover:text-sunny transition">About</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="bg-white border-b border-gray-100 sticky top-14 md:top-16 z-40">
        <div class="max-w-3xl mx-auto px-6 py-3">
            <div id="part-nav" class="flex justify-start md:justify-center items-center gap-2 overflow-x-auto no-scrollbar py-1"></div>
        </div>
    </div>

   <main class="max-w-3xl mx-auto px-6 py-16 md:py-24 animate__animated animate__fadeIn">
        <header class="mb-12">
            <div id="view-team-tag" class="text-[#63489a] text-[11px] font-black mb-3 tracking-widest uppercase"></div>
            <h1 id="view-title" class="text-3xl md:text-5xl font-black leading-tight break-keep mb-8">데이터를 불러오는 중...</h1>
        </header>

        <article>
            <div id="dynamic-body" class="content-text"></div>
        </article>

        <div class="mt-20 py-10 border-t border-gray-100 flex justify-center">
            <button onclick="copyURL()" class="bg-gray-900 text-white px-7 py-2.5 rounded-full font-black text-xs shadow-xl hover:bg-black transition-all transform hover:scale-105">
                아티클 주소 복사하기
            </button>
        </div>

        <div class="py-10 border-t border-gray-200">
            <div class="flex flex-col items-start">
                <a id="team-link" href="#" class="group flex items-center gap-1.5 mb-2">
                    <h2 id="contact-team-name" class="text-xl font-black text-gray-900 group-hover:text-[#63489a] transition-colors">TEAM NAME</h2>
                    <svg class="w-4 h-4 text-gray-400 group-hover:text-[#63489a] mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
                <p id="team-one-liner" class="text-gray-500 text-sm font-medium mb-4 break-keep">사회문제의 본질을 연구하고 해결 가능한 크기로 구조화합니다.</p>
                <div class="flex items-center gap-2 text-[#63489a] font-bold text-xs">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <a id="contact-email-link" href="" class="hover:underline tracking-tight">email@address.com</a>
                </div>
            </div>
        </div>

        <div class="p-5 bg-gray-50 rounded-xl border border-gray-100 flex items-start gap-3">
            <span class="text-gray-400 text-xs mt-0.5">ⓒ</span>
            <p class="text-gray-500 text-[12px] leading-relaxed break-keep">
                2026 SUNNY Scholar의 모든 콘텐츠 저작권은 해당 팀과 SK행복나눔재단에 있습니다. 인용 시에는 반드시 출처를 표기해야 하며, 전문 복사 및 무단 전재·재배포는 금지되어 있습니다. 
            </p>
        </div>

        <div class="mt-10 mb-20 grid grid-cols-1 md:grid-cols-2 gap-3">
            <div id="prev-article" class="invisible">
                <a href="#" class="bottom-nav-card !p-4 border-gray-100 hover:border-[#63489a] rounded-xl flex flex-col group">
                    <span class="text-[9px] font-black text-gray-400 uppercase mb-1 group-hover:text-[#63489a]">Previous</span>
                    <span class="text-[13px] font-bold text-gray-800 line-clamp-1">이전 글</span>
                </a>
            </div>
            <div id="next-article" class="invisible">
                <a href="#" class="bottom-nav-card !p-4 text-right border-gray-100 hover:border-[#63489a] rounded-xl flex flex-col items-end group">
                    <span class="text-[9px] font-black text-gray-400 uppercase mb-1 group-hover:text-[#63489a]">Next</span>
                    <span class="text-[13px] font-bold text-gray-800 line-clamp-1">다음 글</span>
                </a>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        function initView() {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (typeof SUNNY_DATA === 'undefined' || !articleId) return;

            const current = SUNNY_DATA.find(a => a.id === articleId);
            if (!current) {
                document.getElementById('view-title').innerText = "아티클을 찾을 수 없습니다.";
                return;
            }

            // 1. 헤더 텍스트 매핑
            document.getElementById('view-team-tag').innerText = current.teamName;
            document.getElementById('view-title').innerText = current.title;

            // 2. 본문 및 이미지 결합
            const dynamicBody = document.getElementById('dynamic-body');
            let articleContent = current.content || "";

            if (current.thumbnail) {
                articleContent = `
                    <div class="img-container animate__animated animate__fadeIn">
                        <img src="${current.thumbnail}" class="content-img">
                        ${current.thumbnailCaption ? `<p class="img-caption">▲ ${current.thumbnailCaption}</p>` : ''}
                    </div>
                ` + articleContent;
            }

            if (current.subImage) {
                articleContent = articleContent + `
                    <div class="img-container animate__animated animate__fadeIn">
                        <img src="${current.subImage}" class="content-img">
                        ${current.subImageCaption ? `<p class="img-caption">▲ ${current.subImageCaption}</p>` : ''}
                    </div>
                `;
            }
            dynamicBody.innerHTML = articleContent;

            // 3. 팀 정보 업데이트
            const teamLink = document.getElementById('team-link');
            if (current.teamId) {
                teamLink.href = `team_detail.html?teamId=${current.teamId}`;
            }
            document.getElementById('contact-team-name').innerText = current.teamName;
            document.getElementById('team-one-liner').innerText = current.teamDescription || "사회문제의 본질을 연구하고 새로운 시각을 제안합니다.";
            
            const emailAddr = current.email || "sunny@sk.com";
            const emailLink = document.getElementById('contact-email-link');
            emailLink.innerText = emailAddr;
            emailLink.href = `mailto:${emailAddr}`;

            // 4. 상단 탭 (동일 팀 아티클 목록)
            const teamArticles = SUNNY_DATA.filter(a => a.teamId === current.teamId);
            document.getElementById('part-nav').innerHTML = teamArticles.map(art => `
                <a href="article_view.html?id=${art.id}" class="part-tab ${art.id === articleId ? 'active' : ''}">
                    ${art.part}
                </a>
            `).join('');

            // 5. 하단 내비게이션 (이전/다음 글)
            const currentIdx = teamArticles.findIndex(a => a.id === articleId);
            const prevEl = document.getElementById('prev-article');
            const nextEl = document.getElementById('next-article');

            if (currentIdx > 0) {
                const prev = teamArticles[currentIdx - 1];
                prevEl.classList.remove('invisible');
                prevEl.querySelector('a').href = `article_view.html?id=${prev.id}`;
                prevEl.querySelector('span:last-child').innerText = prev.title;
            }
            if (currentIdx < teamArticles.length - 1) {
                const next = teamArticles[currentIdx + 1];
                nextEl.classList.remove('invisible');
                nextEl.querySelector('a').href = `article_view.html?id=${next.id}`;
                nextEl.querySelector('span:last-child').innerText = next.title;
            }
        }

        function copyURL() {
            navigator.clipboard.writeText(window.location.href);
            alert("주소가 복사되었습니다!");
        }

        window.onload = initView;
    </script>
</body>
</html>
