<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article View | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9ff; line-height: 1.8; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
        .part-tab { transition: all 0.3s ease; border-radius: 99px; padding: 6px 16px; white-space: nowrap; font-size: 11px; font-weight: 800; color: #9ca3af; border: 1px solid #eee; }
        .part-tab.active { background: var(--sunny-purple); color: white; border-color: var(--sunny-purple); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bottom-nav-card { transition: all 0.3s ease; border: 1px solid #eee; background: white; padding: 1.5rem; border-radius: 1rem; display: flex; flex-direction: column; }
        .bottom-nav-card:hover { border-color: var(--sunny-purple); transform: translateY(-4px); }
        
        /* 본문 내 텍스트 스타일 정의 */
        .content-text { color: #374151; font-size: 1.125rem; word-break: keep-all; text-align: justify; }
        .content-text p { margin-bottom: 2rem; }
        .content-img { border-radius: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; display: block; object-fit: cover; }
    </style>
</head>
<body class="text-gray-900">
    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-14 md:h-16">
                <a href="index.html" class="flex items-center">
                    <img src="/images/sunny_scholar_logo.png" alt="Logo" class="h-7 md:h-8 w-auto">
                </a>
                <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                    <a href="article_list.html" class="nav-link text-gray-800 hover:text-sunny transition">Articles</a>
                    <a href="team_list.html" class="nav-link text-gray-800 hover:text-sunny transition">Lab</a>
                    <a href="about.html" class="nav-link text-gray-800 hover:text-sunny transition">About</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="bg-white border-b border-gray-100 sticky top-14 md:top-16 z-40">
        <div class="max-w-3xl mx-auto px-6 py-3">
            <div id="part-nav" class="flex justify-start md:justify-center items-center gap-2 overflow-x-auto no-scrollbar py-1"></div>
        </div>
    </div>

    <main class="max-w-3xl mx-auto px-6 py-16 md:py-24 animate__animated animate__fadeIn">
        <header class="mb-12">
            <div id="view-team-tag" class="text-[#63489a] text-[11px] font-black mb-3 tracking-widest uppercase"></div>
            <h1 id="view-title" class="text-3xl md:text-5xl font-black leading-tight break-keep mb-8">데이터를 불러오는 중...</h1>
        </header>

        <article>
            <img id="view-main-img" src="" class="content-img mb-10" style="display:none;">
            
            <div id="dynamic-body" class="content-text"></div>
            
            <img id="view-sub-img" src="" class="content-img mt-10" style="display:none;">
        </article>

        <div class="mt-20 py-10 border-y border-gray-100 flex justify-center">
            <button onclick="copyURL()" class="bg-gray-900 text-white px-8 py-3 rounded-full font-black text-sm shadow-xl hover:bg-black transition-all">
                아티클 주소 복사하기
            </button>
        </div>

        <div class="mt-16 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div id="prev-article" class="invisible">
                <a href="#" class="bottom-nav-card">
                    <span class="text-[10px] font-black text-gray-400 uppercase mb-1">Previous</span>
                    <span class="text-sm font-bold text-gray-900 truncate">이전 글</span>
                </a>
            </div>
            <div id="next-article" class="invisible">
                <a href="#" class="bottom-nav-card text-right">
                    <span class="text-[10px] font-black text-gray-400 uppercase mb-1">Next</span>
                    <span class="text-sm font-bold text-gray-900 truncate">다음 글</span>
                </a>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        function initView() {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (typeof SUNNY_DATA === 'undefined' || !articleId) return;

            const current = SUNNY_DATA.find(a => a.id === articleId);
            if (!current) {
                document.getElementById('view-title').innerText = "아티클을 찾을 수 없습니다.";
                return;
            }

            // [핵심] 데이터 매핑
            document.getElementById('view-team-tag').innerText = current.teamName;
            document.getElementById('view-title').innerText = current.title;
            document.getElementById('dynamic-body').innerHTML = current.content || "";

            // [이미지 처리] data.js에 지정된 경로를 그대로 사용
            const mainImg = document.getElementById('view-main-img');
            if(current.thumbnail) {
                mainImg.src = current.thumbnail;
                mainImg.style.display = 'block';
            }

            const subImg = document.getElementById('view-sub-img');
            if(current.subImage) {
                subImg.src = current.subImage;
                subImg.style.display = 'block';
            }

            // 상단 탭 (같은 팀 아티클 목록)
            const teamArticles = SUNNY_DATA.filter(a => a.teamId === current.teamId);
            document.getElementById('part-nav').innerHTML = teamArticles.map(art => `
                <a href="article_view.html?id=${art.id}" class="part-tab ${art.id === articleId ? 'active' : ''}">
                    ${art.part}
                </a>
            `).join('');

            // 하단 내비게이션 로직
            const currentIdx = teamArticles.findIndex(a => a.id === articleId);
            const prevEl = document.getElementById('prev-article');
            const nextEl = document.getElementById('next-article');

            if (currentIdx > 0) {
                const prev = teamArticles[currentIdx - 1];
                prevEl.classList.remove('invisible');
                prevEl.querySelector('a').href = `article_view.html?id=${prev.id}`;
                prevEl.querySelector('span:last-child').innerText = prev.title;
            }
            if (currentIdx < teamArticles.length - 1) {
                const next = teamArticles[currentIdx + 1];
                nextEl.classList.remove('invisible');
                nextEl.querySelector('a').href = `article_view.html?id=${next.id}`;
                nextEl.querySelector('span:last-child').innerText = next.title;
            }
        }

        function copyURL() {
            navigator.clipboard.writeText(window.location.href);
            alert("주소가 복사되었습니다!");
        }

        window.onload = initView;
    </script>
</body>
</html>
