<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
     @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');

    :root {
        --sunny-purple: #63489a;
        --sunny-deep-purple: #4e387a;
        --sunny-gradient: linear-gradient(135deg, #4f319b 0%, #8c52ff 100%);
        --grid-color: rgba(99, 72, 154, 0.05);
    }

    body { 
        font-family: 'Pretendard', sans-serif; 
        background-color: #fcfcfd; /* 인덱스와 동일한 배경색 */
        background-image: 
            linear-gradient(to bottom, rgba(99, 72, 154, 0.05) 0%, transparent 15%),
            linear-gradient(var(--grid-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 100% 100%, 40px 40px, 40px 40px;
        letter-spacing: -0.02em;
    }

    /* --- [핵심] 상단바 규격 통일 (어바웃/인덱스와 1:1 일치) --- */
    header { 
        height: 64px !important; 
        position: sticky !important;
        top: 0 !important;
        z-index: 50 !important;
        background: rgba(255, 255, 255, 0.8) !important; 
        backdrop-filter: blur(12px) !important; 
        -webkit-backdrop-filter: blur(12px) !important; 
        border-bottom: 1px solid rgba(0, 0, 0, 0.05) !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    .header-container {
        max-width: 80rem !important; /* max-w-7xl 동일 */
        margin-left: auto !important;
        margin-right: auto !important;
        padding-left: 1.5rem !important; /* px-6 동일 */
        padding-right: 1.5rem !important;
        width: 100% !important;
        height: 100% !important;
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        box-sizing: border-box !important;
    }

    .nav-link {
        position: relative !important;
        height: 64px !important;
        display: flex !important;
        align-items: center !important;
        color: #1f2937 !important;
        font-size: 11px !important;
        font-weight: 900 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.1em !important;
        transition: color 0.3s ease !important;
        text-decoration: none !important;
    }

    .nav-link::after {
        content: '' !important;
        position: absolute !important;
        bottom: 18px !important; /* 언더바 위치 고정 */
        left: 50% !important;
        width: 0 !important;
        height: 2px !important;
        background-color: #63489a !important;
        transition: all 0.3s ease !important;
        transform: translateX(-50%) !important;
    }

    .nav-link:hover::after,
    .nav-link.active-tab::after {
        width: 100% !important;
    }

    .nav-link.active-tab {
        color: #63489a !important;
    }

    /* --- 아티클 페이지 전용 스타일 유지 및 보정 --- */
    .text-gradient { background: var(--sunny-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* 가로 스크롤 영역 끝단 그라데이션 (배경색 통일) */
    .scroll-container-wrapper::after {
        content: "";
        position: absolute;
        top: 0; right: 0;
        width: 80px;
        height: calc(100% - 40px);
        background: linear-gradient(to right, transparent, #fcfcfd); /* 배경색에 맞춤 */
        pointer-events: none;
        z-index: 10;
    }

    /* 카드 썸네일 비율 고정 */
    .group img {
        aspect-ratio: 16 / 9;
        object-fit: cover;
    }
</style>
</head>
<body class="text-gray-900">

<header>
    <div class="header-container">
        <a href="index.html" class="flex items-center">
            <img src="/images/sunny_scholar_logo.png" alt="Logo" style="height: 32px; width: auto;">
        </a>

        <nav class="hidden md:flex items-center" style="gap: 2.5rem;">
            <a href="article_list.html" class="nav-link active-tab">Articles</a>
            <a href="team_list.html" class="nav-link">Lab</a>
            <a href="about.html" class="nav-link">About</a>
        </nav>
    </div>
</header>

<section class="py-12 md:py-16 px-6 max-w-7xl mx-auto">
    <p class="text-[#63489a] font-black tracking-widest text-[10px] uppercase mb-2">Step 01 Archive</p>
    <h1 class="text-3xl md:text-4xl font-black mb-2 tracking-tight">Problem Definition <span class="text-gradient">Articles</span></h1>
    <p class="text-gray-500 text-sm font-medium">5개의 팀이 정의한 문제의 본질을 아티클로 확인하세요.</p>
</section>

<main id="article-page" class="max-w-7xl mx-auto pb-24 space-y-20"></main>

<script src="data.js"></script>
<script>
function renderArticles() {
    const page = document.getElementById('article-page');
    if (typeof SUNNY_DATA === 'undefined' || typeof TEAM_DATA === 'undefined') return;

    page.innerHTML = '';

    Object.keys(TEAM_DATA).forEach(tId => {
        const team = TEAM_DATA[tId];
        const teamArticles = SUNNY_DATA.filter(d => d.teamId === tId);

        const section = document.createElement('section');
        section.id = tId; 
        section.className = "scroll-mt-24";

        section.innerHTML = `
            <div class="px-6 mb-6">
                <div class="bg-white rounded-[24px] p-6 md:p-8 border border-gray-100 shadow-sm relative overflow-hidden group">
                    <div class="relative z-10">
                        <div class="flex flex-col gap-4">
                            <div class="flex items-center justify-between">
                                <span class="bg-[#63489a] text-white text-[10px] font-extrabold px-2 py-1 rounded uppercase tracking-wider">${team.order}</span>
                                <div class="flex gap-1.5">
                                    ${team.tags.map(tag => `
                                        <span class="px-3 py-1 rounded-lg text-[11px] font-extrabold border border-gray-50 shadow-sm" 
                                              style="background-color: ${team.theme.tagBg}; color: ${team.theme.main}">#${tag}</span>
                                    `).join('')}
                                </div>
                            </div>
                            <h2 class="text-2xl md:text-3xl font-black text-gray-950 tracking-tighter">${team.teamName}</h2>
                            <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 border-t border-gray-50 pt-4">
                                <p class="text-[14px] md:text-[15px] font-bold text-gray-500 leading-snug max-w-2xl whitespace-pre-line">${team.summary}</p>
                                <a href="team_detail.html?teamId=${tId}" class="inline-flex items-center gap-1.5 text-[13px] font-black text-[#63489a] hover:underline flex-shrink-0">
                                    팀 연구 정보 보기
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="scroll-container-wrapper group/scroll">
                <div class="flex gap-5 overflow-x-auto pb-10 scrollbar-hide px-6 cursor-grab active:cursor-grabbing horizontal-scroll">
               ${teamArticles.map(art => `
    <a href="article_view.html?id=${art.id}" class="group block bg-white rounded-[24px] overflow-hidden border border-gray-100 hover:shadow-xl transition-all duration-500 min-w-[280px] md:min-w-[320px] flex-shrink-0 flex flex-col">
        
        <div class="w-full h-[180px] md:h-[200px] bg-gray-100 overflow-hidden relative flex-shrink-0">
            <img src="${art.thumbnail}" 
                 class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                 onerror="this.src='https://via.placeholder.com/400x225?text=SUNNY+ARTICLE'">
        </div>
        
        <div class="p-6 flex flex-col">
            <div class="h-5 mb-2">
                <span class="text-[10px] font-black text-[#63489a] uppercase tracking-widest">
                    ${art.part}
                </span>
            </div>

            <div class="h-[3rem] mb-2">
                <h4 class="font-black text-lg text-gray-900 leading-snug group-hover:text-[#63489a] transition-colors break-keep line-clamp-2">
                    ${art.title}
                </h4>
            </div>
            
            <div class="flex justify-end items-center h-6 mt-2">
                <svg class="w-5 h-5 text-[#63489a] opacity-0 group-hover:opacity-100 transition-all transform translate-x-[-10px] group-hover:translate-x-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                </svg>
            </div>
        </div>
    </a>
`).join('')}
                    <div class="min-w-[24px] h-1 flex-shrink-0"></div>
                </div>
            </div>
        `;
        page.appendChild(section); 
    });

    initHorizontalScroll();
    setTimeout(handleScrollToHash, 100);
}

function initHorizontalScroll() {
    const containers = document.querySelectorAll('.horizontal-scroll');
    containers.forEach(container => {
        container.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                e.preventDefault();
                container.scrollLeft += e.deltaY;
            }
        });
    });
}

function handleScrollToHash() {
    const hash = window.location.hash;
    if (!hash) return;
    const target = document.querySelector(hash);
    if (!target) return;
    target.classList.add('animate__animated', 'animate__fadeInUp');
    const headerHeight = 80; 
    const targetPosition = target.getBoundingClientRect().top + window.pageYOffset - headerHeight;
    window.scrollTo({ top: targetPosition, behavior: 'smooth' });
}

window.onload = renderArticles;
</script>
</body>
</html>
