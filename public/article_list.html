<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Article List - SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        
        html { scroll-behavior: smooth; }
        body { font-family: 'Pretendard', sans-serif; background-color: #fcfcfd; }
        
        /* 팀 배너 스타일 */
        .team-header-banner {
            border-radius: 24px;
            padding: 48px 40px;
            color: white;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        
        .bg-text-large {
            position: absolute;
            right: -10px;
            top: -10px;
            font-size: 9rem;
            font-weight: 900;
            opacity: 0.08;
            font-style: italic;
            letter-spacing: -0.05em;
            user-select: none;
            line-height: 1;
        }

        /* 아티클 카드 애니메이션 */
        .article-card {
            transition: all 0.3s ease;
        }
        .article-card:hover {
            transform: translateY(-5px);
            border-color: #63489a;
        }
    </style>
</head>
<body>

<main class="max-w-7xl mx-auto px-6 py-16">
    <div id="article-page-container"></div>
</main>

<script src="data.js"></script>
<script>
    function renderTeamSections() {
        const container = document.getElementById('article-page-container');
        if (!container) return;
        container.innerHTML = '';

        // data.js의 TEAM_DATA를 순회하며 섹션 생성
        Object.keys(TEAM_DATA).forEach(id => {
            const team = TEAM_DATA[id];
            
            // 해당 팀의 아티클 필터링 (SUNNY_DATA 기준)
            const teamArticles = SUNNY_DATA.filter(article => article.teamId === id);

            const section = document.createElement('section');
            section.id = id; // index.html의 해시(#id)와 매칭
            section.className = "mb-24 scroll-mt-28"; // 스크롤 시 헤더 여백 고려

            section.innerHTML = `
                <div class="team-header-banner animate__animated animate__fadeIn" style="background: ${team.theme.grad}">
                    <div class="bg-text-large">${team.theme.bgText}</div>
                    <div class="relative z-10">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="px-3 py-1 bg-white/20 rounded-md text-[10px] font-black tracking-widest uppercase">
                                ${team.order}
                            </span>
                            <span class="text-xs font-bold opacity-80">${team.category}</span>
                        </div>
                        <h2 class="text-4xl font-black mb-4 tracking-tight">${team.teamName}</h2>
                        <p class="text-lg opacity-90 whitespace-pre-line mb-8 font-medium max-w-2xl leading-relaxed">
                            ${team.summary}
                        </p>
                        <div class="flex flex-wrap gap-2">
                            ${team.tags.map(tag => `
                                <span class="px-4 py-1.5 bg-white text-gray-900 rounded-full text-[11px] font-bold shadow-sm">
                                    #${tag}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${teamArticles.length > 0 ? 
                        teamArticles.map(art => `
                            <div class="article-card bg-white p-8 rounded-2xl border border-gray-100 shadow-sm flex flex-col cursor-pointer" 
                                 onclick="location.href='article_view.html?id=${art.id}'">
                                <span class="text-[10px] font-black text-[#63489a] mb-3 tracking-widest uppercase">${art.part || 'Research'}</span>
                                <h4 class="text-xl font-bold text-gray-900 mb-6 leading-snug break-keep">${art.title}</h4>
                                <div class="mt-auto flex justify-between items-center">
                                    <span class="text-xs text-gray-400 font-bold uppercase tracking-tighter">Read Article</span>
                                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-[#63489a] transition-colors">
                                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                    </div>
                                </div>
                            </div>
                        `).join('') 
                        : `<div class="col-span-full py-12 text-center border-2 border-dashed border-gray-100 rounded-2xl text-gray-300 font-bold">등록된 아티클이 없습니다.</div>`
                    }
                </div>
            `;
            container.appendChild(section);
        });
    }

    // 초기 실행 및 해시 스크롤 처리
    window.addEventListener('DOMContentLoaded', () => {
        renderTeamSections();
        
        // URL에 #id가 포함되어 넘어온 경우
        if (window.location.hash) {
            const targetId = window.location.hash;
            // 렌더링 완료 후 이동하기 위해 약간의 지연시간 부여
            setTimeout(() => {
                const element = document.querySelector(targetId);
                if (element) {
                    const offset = 100; // 헤더 높이만큼 오프셋
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = element.getBoundingClientRect().top;
                    const elementPosition = elementRect - bodyRect;
                    const offsetPosition = elementPosition - offset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: 'smooth'
                    });
                }
            }, 200);
        }
    });
</script>
</body>
</html>
