<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles | 2026 SUNNY Scholar</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
:root {
--sunny-purple: #63489a;
--sunny-gradient: linear-gradient(135deg, #4f319b 0%, #8c52ff 100%);
--grid-color: rgba(99, 72, 154, 0.05);
}
body { 
font-family: 'Pretendard', sans-serif; 
background-color: #f8f9ff;
background-image: 
linear-gradient(to bottom, rgba(99, 72, 154, 0.05) 0%, transparent 15%),
linear-gradient(var(--grid-color) 1px, transparent 1px),
linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
background-size: 100% 100%, 40px 40px, 40px 40px;
}
.glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
.scrollbar-hide::-webkit-scrollbar { display: none; }
.scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
.text-gradient { background: var(--sunny-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* 팀 정보 요약 박스 스타일 */
.team-info-box {
    background: white;
    border: 1px solid #f0f0f5;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
}
.tag-mini {
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 800;
    border-radius: 5px;
}
</style>
</head>
<body class="text-gray-900">

<header class="sticky top-0 z-50 glass border-b border-gray-100">
<div class="max-w-7xl mx-auto px-6 h-14 md:h-16 flex justify-between items-center">
<a href="index.html"><img src="images/sunny_scholar_logo.png" class="h-7 md:h-8 w-auto" onerror="this.src='https://via.placeholder.com/150x40?text=LOGO'"></a>
<nav class="hidden md:flex space-x-10 text-xs font-black uppercase tracking-widest">
<a href="article_list.html" class="text-gray-800 border-b-2 border-[#63489a]">Articles</a>
<a href="team_list.html" class="text-gray-400 hover:text-gray-800 transition">Lab</a>
<a href="about.html" class="text-gray-400 hover:text-gray-800 transition">About</a>
</nav>
</div>
</header>

<section class="py-12 md:py-16 px-6 max-w-7xl mx-auto">
<p class="text-[#63489a] font-black tracking-widest text-[10px] uppercase mb-2">Step 01 Archive</p>
<h1 class="text-3xl md:text-4xl font-black mb-2 tracking-tight">Problem Definition <span class="text-gradient">Articles</span></h1>
<p class="text-gray-500 text-sm font-medium">5개의 팀이 정의한 문제의 본질을 아티클로 확인하세요.</p>
</section>

<main id="article-page" class="max-w-7xl mx-auto px-6 pb-24 space-y-24"></main>

<script src="data.js"></script>
<script>
function renderArticles() {
    const page = document.getElementById('article-page');
    if (typeof SUNNY_DATA === 'undefined' || typeof TEAM_DATA === 'undefined') {
        console.error("데이터 로드 실패");
        return;
    }

    page.innerHTML = ''; // 중복 렌더링 방지

    // 1. 팀별 아티클 섹션 생성
    Object.keys(TEAM_DATA).forEach(tId => {
        const team = TEAM_DATA[tId];
        const teamArticles = SUNNY_DATA.filter(d => d.teamId === tId);

        const section = document.createElement('section');
        section.id = tId; 
        section.className = "animate__animated animate__fadeInUp animate-fast scroll-mt-24 mb-20"; // mb-20으로 팀간 간격 확보

 section.innerHTML = `
            <div class="bg-white rounded-[24px] p-6 md:p-8 border border-gray-100 shadow-[0_4px_20px_rgb(0,0,0,0.03)] mb-8 relative overflow-hidden group">
                
                <div class="relative z-10">
                    <div class="flex flex-col md:flex-row md:items-start justify-between gap-4 mb-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="bg-[#63489a] text-white text-[11px] font-extrabold px-2 py-0.5 rounded uppercase tracking-wider shadow-sm">
                                    ${team.order}
                                </span>
                                </div>
                            <h2 class="text-3xl md:text-5xl font-black text-gray-950 tracking-tighter mb-4">
                                ${team.teamName}
                            </h2>
                            <p class="text-[17px] md:text-[19px] font-bold text-gray-600 leading-snug max-w-3xl whitespace-pre-line">
                                ${team.summary}
                            </p>
                        </div>

                        <div class="flex flex-wrap md:justify-end gap-2 self-start mt-2">
                            ${team.tags.map(tag => `
                                <span class="px-5 py-2 rounded-xl text-[13px] md:text-[14px] font-extrabold border border-gray-100 shadow-sm" 
                                      style="background-color: ${team.theme.tagBg}; color: ${team.theme.main}">
                                    #${tag}
                                </span>
                            `).join('')}
                        </div>
                    </div>

                    <div class="pt-4 border-t border-gray-50 flex items-center justify-end">
                        <a href="team_detail.html?teamId=${tId}" 
                           class="inline-flex items-center gap-2 text-[14px] md:text-[16px] font-black text-[#63489a] hover:text-[#4e387a] transition-all group/btn">
                            팀 연구 정보 보기
                            <svg class="w-5 h-5 transform group-hover/btn:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-6 overflow-x-auto pb-10 scrollbar-hide px-2">
                ${teamArticles.map(art => `
                    <a href="article_view.html?id=${art.id}" class="group block bg-white rounded-[24px] overflow-hidden border border-gray-100 hover:shadow-[0_20px_50px_rgba(0,0,0,0.1)] transition-all duration-500 min-w-[300px] md:min-w-[340px] flex-shrink-0">
                        <div class="relative w-full pb-[60%] overflow-hidden bg-gray-50">
                            <img src="${art.thumbnail}" 
                                class="absolute top-0 left-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" 
                                onerror="this.src='https://via.placeholder.com/400x225?text=SUNNY+ARTICLE'">
                        </div>
                        <div class="p-6">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="text-[10px] font-black text-[#63489a] uppercase tracking-[0.15em]">${art.part}</span>
                            </div>
                            <h4 class="font-black text-xl text-gray-900 leading-[1.4] group-hover:text-[#63489a] transition-colors break-keep line-clamp-2">
                                ${art.title}
                            </h4>
                        </div>
                    </a>
                `).join('')}
            </div>
        `;

page.appendChild(section); 
    });

    // 2. 렌더링이 끝난 직후에 스크롤 위치 보정 실행
    handleScrollToHash();
}

function handleScrollToHash() {
    if (window.location.hash) {
        const targetId = window.location.hash;
        
        setTimeout(() => {
            const element = document.querySelector(targetId);
            if (element) {
                // [수정] 첫 번째 팀(#foure)일 때는 헤더 오프셋을 거의 주지 않거나 작게 설정
                // 일반 팀은 220, 첫 팀은 100 정도로 조절
                const isFirstTeam = targetId === '#foure';
                const headerOffset = isFirstTeam ? 20 : 200; 
                
                const elementPosition = element.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                window.scrollTo({
                    top: offsetPosition,
                    behavior: 'smooth'
                });
            }
        }, 400); 
    }
}

// 페이지 로드 시 실행
window.onload = renderArticles;
</script>
</body>
</html>
