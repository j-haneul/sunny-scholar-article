<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>Articles | SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css'); body{font-family:'Pretendard'; background:#f8f9ff;}</style>
</head>
<body>
    <header class="p-6 border-b bg-white sticky top-0 z-50 flex justify-between items-center">
        <a href="index.html"><img src="SUNNY_Scholar_Logo.png" class="h-8"></a>
        <nav class="space-x-6 text-xs font-bold uppercase"><a href="article_list.html" class="text-[#63489a]">Articles</a><a href="about.html">About</a></nav>
    </header>

    <main class="max-w-6xl mx-auto p-6 py-12">
        <h1 class="text-3xl font-black mb-8">Problem Definition Articles</h1>
        
        <div id="list-container" class="space-y-12"></div>
    </main>

    <script src="data.js"></script>
    <script>
        const container = document.getElementById('list-container');
        // 팀별로 데이터를 그룹화해서 출력 (간략 버전)
        const teams = ["포레 (FORET)", "헤아림"]; // 팀 리스트
        
        teams.forEach(teamName => {
            const teamArticles = SUNNY_DATA.filter(d => d.team === teamName);
            if(teamArticles.length === 0) return;

            let html = `
                <div class="bg-white rounded-3xl p-8 border border-gray-100 shadow-sm">
                    <h2 class="text-2xl font-black mb-6">${teamName}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">`;
            
            teamArticles.forEach(art => {
                html += `
                    <a href="article_view.html?id=${art.id}" class="group">
                        <div class="aspect-video bg-gray-100 rounded-xl overflow-hidden mb-3">
                            <img src="${art.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition">
                        </div>
                        <span class="text-[10px] font-black text-[#63489a]">${art.step}</span>
                        <h3 class="text-xs font-bold leading-tight line-clamp-2">${art.title}</h3>
                    </a>`;
            });
            
            html += `</div></div>`;
            container.innerHTML += html;
        });
    </script>
</body>
</html>
