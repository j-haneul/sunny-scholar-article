<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9ff; }
        .article-card { transition: all 0.3s ease; border-radius: 1.5rem; background: white; flex-shrink: 0; }
        .article-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-900">

    <header class="p-6 border-b bg-white/70 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="font-black text-xl">SUNNY SCHOLAR</a>
            <nav class="space-x-6 text-xs font-bold uppercase">
                <a href="article_list.html" class="text-purple-600">Articles</a>
                <a href="team_list.html">Lab</a>
            </nav>
        </div>
    </header>

    <main id="article-page" class="max-w-7xl mx-auto px-6 py-20 space-y-20">
        </main>

    <script src="data.js"></script>
    
    <script>
        window.onload = function() {
            const page = document.getElementById('article-page');

            // [체크 1] 데이터가 로드되었는지 확인
            if (typeof SUNNY_DATA === 'undefined') {
                page.innerHTML = `<div class="p-10 bg-red-50 text-red-500 rounded-xl">
                    <b>데이터 로드 실패:</b> data.js 파일을 찾을 수 없거나 문법 오류가 있습니다.
                </div>`;
                return;
            }

            try {
                const teamIds = [...new Set(SUNNY_DATA.map(d => d.teamId))];
                
                teamIds.forEach(tId => {
                    const teamArticles = SUNNY_DATA.filter(d => d.teamId === tId);
                    const teamDetail = (typeof TEAM_DETAILS !== 'undefined') ? TEAM_DETAILS[tId] : null;

                    const section = document.createElement('section');
                    section.innerHTML = `
                        <h2 class="text-2xl font-black mb-8 border-b pb-4">${teamDetail?.name || teamArticles[0].teamName}</h2>
                        <div class="flex gap-6 overflow-x-auto pb-10 scrollbar-hide">
                            ${teamArticles.map(art => `
                                <a href="article_view.html?id=${art.id}" class="article-card min-w-[300px] p-8 border border-gray-100">
                                    <div class="w-16 h-16 rounded-xl overflow-hidden mb-6 bg-gray-100">
                                        <img src="${art.thumbnail}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/100'">
                                    </div>
                                    <p class="text-[10px] font-bold text-purple-600 mb-2">${art.part}</p>
                                    <h3 class="text-xl font-black leading-tight">${art.title}</h3>
                                </a>
                            `).join('')}
                        </div>
                    `;
                    page.appendChild(section);
                });
            } catch (e) {
                console.error(e);
                page.innerHTML = `오류 발생: ${e.message}`;
            }
        };
    </script>
</body>
</html>
