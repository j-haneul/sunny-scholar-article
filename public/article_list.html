<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        
        :root {
            --sunny-purple: #63489a;
            --sunny-gradient: linear-gradient(135deg, #4f319b 0%, #8c52ff 100%);
            --grid-color: rgba(99, 72, 154, 0.05);
        }
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8f9ff;
            background-image: 
                linear-gradient(to bottom, rgba(99, 72, 154, 0.05) 0%, transparent 15%),
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            letter-spacing: -0.02em;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px 0 rgba(31, 38, 135, 0.05);
        }

        /* Index와 동일한 Nav 스타일 */
        .nav-link { position: relative; }
        .nav-link::after {
            content: ''; position: absolute; width: 0; height: 3px;
            bottom: -4px; left: 0; background-color: var(--sunny-purple);
            transition: width 0.2s ease; border-radius: 2px;
        }
        .nav-link.active::after { width: 100%; }
        .nav-link:hover::after { width: 100%; }

        /* Article Card 스타일 (Index Team Card 느낌 계승) */
        .article-card { 
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease; 
            border-radius: 1.25rem;
        }
        .article-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .text-gradient {
            background: var(--sunny-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-gray-900">

    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-14 md:h-16">
                <a href="index.html" class="flex items-center">
                    <img src="/images/sunny_scholar_logo.png" alt="Logo" class="h-7 md:h-8 w-auto">
                </a>
                <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                    <a href="article_list.html" class="nav-link active text-gray-800">Articles</a>
                    <a href="team_detail.html" class="nav-link text-gray-800">Lab</a>
                    <a href="about.html" class="nav-link text-gray-800">About</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="py-12 md:py-16 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="animate__animated animate__fadeIn animate__faster">
                <p class="text-[#63489a] font-black tracking-widest text-[10px] uppercase mb-2">Step 01 Archive</p>
                <h1 class="text-3xl md:text-4xl font-black mb-2 tracking-tight">
                    Problem Definition <span class="text-gradient">Articles</span>
                </h1>
                <p class="text-gray-500 text-sm font-medium">5개의 팀이 정의한 문제의 본질을 아티클로 확인하세요.</p>
            </div>
        </div>
    </section>

    <main id="article-page" class="max-w-7xl mx-auto px-6 pb-24 space-y-20">
        </main>

    <footer class="bg-gray-900 py-12 px-6">
        <div class="max-w-7xl mx-auto text-center md:text-left">
            <img src="/images/sunny_scholar_logo.png" class="h-6 mb-3 brightness-0 invert opacity-40 mx-auto md:mx-0">
            <p class="text-gray-600 text-[10px]">© 2026 SUNNY Scholar Archive. Designed for Problem Definers.</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script>
      function renderArticles() {
            const page = document.getElementById('article-page');
            if (typeof SUNNY_DATA === 'undefined') return;

            // 팀 이름 중복 제거하여 리스트 생성
            const teams = [...new Set(SUNNY_DATA.map(d => d.teamName))];

            teams.forEach(team => {
                const teamData = SUNNY_DATA.filter(d => d.teamName === team);
                const order = teamData[0].teamOrder;
                // 해당 팀의 ID 추출 (team_detail.html?id=... 에 사용)
                const teamId = teamData[0].teamId; 

                const section = document.createElement('section');
                section.className = "animate__animated animate__fadeInUp animate-fast";
                section.innerHTML = `
                    <div class="flex justify-between items-end mb-8 border-b border-gray-100 pb-4">
                        <div class="flex items-center gap-3">
                            <span class="bg-[#63489a] text-white text-[10px] font-black px-2 py-1 rounded">${order}</span>
                            <h2 class="text-xl md:text-2xl font-black text-gray-900">${team}</h2>
                        </div>
                        <a href="team_detail.html?id=${teamId}" class="text-[11px] font-black text-[#63489a] hover:opacity-70 transition flex items-center gap-1">
                            팀 정보 보기 <span class="text-[14px]">→</span>
                        </a>
                    </div>
                    
                    <div class="flex gap-6 overflow-x-auto pb-8 scrollbar-hide px-1">
                        ${teamData.map(art => `
                            <a href="article_view.html?id=${art.id}" class="article-card min-w-[280px] md:min-w-[320px] bg-white p-5 border border-gray-100 shadow-sm flex-shrink-0 group">
                                <div class="aspect-[16/10] rounded-xl overflow-hidden mb-5 bg-gray-50 shadow-inner">
                                    <img src="${art.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400x250?text=SUNNY+Scholar'">
                                </div>
                                <p class="text-[10px] font-black text-[#8c52ff] mb-2 uppercase tracking-tighter">${art.part}</p>
                                <h3 class="text-sm md:text-base font-black text-gray-900 leading-tight line-clamp-2 h-10 md:h-12 group-hover:text-[#63489a] transition-colors">${art.title}</h3>
                                <div class="mt-4 pt-4 border-t border-gray-50 flex items-center text-[11px] font-bold text-gray-400 group-hover:text-[#63489a] transition-colors">
                                    <span>Read Article</span>
                                    <span class="ml-auto">→</span>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                `;
                page.appendChild(section);
            });
        }
        window.onload = renderArticles;
    </script>
</body>
</html>
