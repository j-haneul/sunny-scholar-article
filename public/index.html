    <script>
        function setActiveMenu() {
            const path = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');

            navLinks.forEach(link => {
                link.classList.remove('active-tab');
                const href = link.getAttribute('href');
                
                // 현재 경로에 해당 파일명이 포함되어 있으면 active 클래스 추가
                // index.html의 경우 경로가 '/' 이거나 'index.html'일 때 활성화
if ((path.includes(href) && href !== "") || (path.endsWith('/') && href === "index.html")) {
            link.classList.add('active-tab');
                }
            });
        }
        window.addEventListener('load', setActiveMenu);
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');

        :root {
            --sunny-purple: #63489a;
            --sunny-deep-purple: #4e387a;
            --sunny-gradient: linear-gradient(135deg, #4f319b 0%, #8c52ff 100%);
            --grid-color: rgba(99, 72, 154, 0.05);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #fcfcfd;
            background-image: 
                linear-gradient(to bottom, rgba(99, 72, 154, 0.05) 0%, transparent 15%),
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

/* 상단바 전체 설정 */
header { 
    height: 64px !important; 
    position: sticky !important;
    top: 0 !important;
    z-index: 50 !important;
    /* 블러 효과 강제 적용 */
    background: rgba(255, 255, 255, 0.8) !important; 
    backdrop-filter: blur(12px) !important; 
    -webkit-backdrop-filter: blur(12px) !important; 
    border-bottom: 1px solid rgba(0, 0, 0, 0.05) !important;
    width: 100% !important;
    box-sizing: border-box !important;
}

/* 가로 너비 및 패딩 통일 (어바웃/인덱스 동일하게) */
.header-container {
    max-width: 80rem !important; /* max-w-7xl과 동일 */
    margin-left: auto !important;
    margin-right: auto !important;
    padding-left: 1.5rem !important; /* px-6과 동일 */
    padding-right: 1.5rem !important;
    width: 100% !important;
    height: 100% !important;
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
    box-sizing: border-box !important;
}

/* 메뉴 텍스트 및 밑줄 설정 */
.nav-link {
    position: relative !important;
    height: 64px !important;
    display: flex !important;
    align-items: center !important;
    color: #1f2937 !important;
    font-size: 11px !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
    transition: color 0.3s ease !important;
    text-decoration: none !important;
}

.nav-link::after {
    content: '' !important;
    position: absolute !important;
    bottom: 18px !important; /* 텍스트 바로 밑 (높이에 따라 16~20 사이 조정) */
    left: 50% !important;
    width: 0 !important;
    height: 2px !important;
    background-color: #63489a !important;
    transition: all 0.3s ease !important;
    transform: translateX(-50%) !important;
}

.nav-link:hover::after,
.nav-link.active-tab::after {
    width: 100% !important;
}

.nav-link.active-tab {
    color: #63489a !important;
}

        /* --- 팀 카드 및 기타 스타일 --- */
        .team-card {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            background: #ffffff;
            border: 1px solid #f0f0f5;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }
        .team-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 40px 80px -15px rgba(99, 60, 187, 0.15);
            border-color: #d1d1e9;
        }

        .card-banner {
            position: relative;
            min-height: 180px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }
        
        .banner-bg-text {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            line-height: 1;
            user-select: none;
            pointer-events: none;
            font-style: italic;
            letter-spacing: -0.05em;
        }

        .tag-block {
            display: inline-block;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 800;
            border-radius: 6px;
            margin-right: 4px;
            letter-spacing: -0.02em;
        }

        .bg-sunny-gradient { background: var(--sunny-gradient); }
        .text-gradient { background: var(--sunny-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-text-box { background: white; padding: 4px 16px; border-radius: 8px; display: inline-block; }
        
        .filter-btn { transition: all 0.3s ease; font-weight: 800; }
        .filter-btn.active { color: white; background-color: var(--sunny-purple); border-color: var(--sunny-purple); }
    </style>
</head>

    <div class="flex flex-col md:flex-row justify-between items-end mb-10 border-b border-gray-100 pb-6">

            <button onclick="filterTeams('이주')" class="filter-btn px-4 py-1.5 rounded-full border border-gray-200 text-[11px] text-gray-400 hover:border-[#63489a] hover:text-[#63489a]">#이주민</button>

<script src="data.js"></script>
<script>
    function renderTeamCards(filter = 'all') {
        const container = document.getElementById('team-container');
        if (!container) return;
        container.innerHTML = ''; 

        Object.keys(TEAM_DATA).forEach(id => {
            const team = TEAM_DATA[id];
            if (filter !== 'all' && team.category !== filter) return;

            const card = document.createElement('div');
            card.className = "team-card group animate__animated animate__fadeIn";
            card.onclick = () => { location.href = `article_list.html#${id}`; };

            card.innerHTML = `
                <div class="card-banner text-white" style="background: ${team.theme.grad}">
                    <div class="banner-bg-text">${team.theme.bgText}</div>
                    <div class="relative z-10">
                        <span class="text-[9px] font-black tracking-[0.3em] mb-2 block uppercase opacity-70">${team.order}</span>
                        <h3 class="text-2xl font-black tracking-tighter leading-none mb-4">${team.teamName}</h3>
                        <p class="text-[13px] font-bold leading-snug text-white/90 whitespace-pre-line">${team.summary}</p>
                    </div>
                </div>
                <div class="p-6 flex flex-col flex-grow bg-white">
                    <div class="flex flex-wrap gap-1.5 mb-6">
                        ${team.tags.map(tag => `<span class="tag-block" style="background-color: ${team.theme.tagBg}; color: ${team.theme.main}">#${tag}</span>`).join('')}
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-50 flex justify-between items-center">
                        <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest group-hover:text-[#63489a] transition-colors">View Articles</span>
                        <div class="w-7 h-7 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-[#63489a] group-hover:text-white transition-all">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        if (filter === 'all') {
            const allCard = document.createElement('div');
            allCard.className = "team-card group animate__animated animate__fadeIn flex items-center justify-center border-2 border-dashed border-gray-100 bg-gray-50/50 hover:bg-[#f5f0ff] hover:border-[#63489a]/30";
            allCard.style.minHeight = "350px";
            allCard.onclick = () => { location.href = 'article_list.html'; };
            
            allCard.innerHTML = `
                <div class="text-center p-8">
                    <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm mx-auto mb-6 group-hover:scale-110 transition-transform">
                        <span class="text-2xl text-[#63489a] font-black">+</span>
                    </div>
                    <h3 class="text-xl font-black text-gray-900 mb-2">25개 전체 아티클 보기</h3>
                    <p class="text-[12px] text-gray-400 font-bold uppercase tracking-tight">Sunny Scholar 1단계 모든 기록</p>
                </div>
            `;
            container.appendChild(allCard);
        }
    }

    function filterTeams(category) {
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            btn.classList.remove('active', 'text-white', 'bg-[#63489a]');
            btn.classList.add('text-gray-400');
        });
        event.currentTarget.classList.add('active', 'text-white', 'bg-[#63489a]');
        event.currentTarget.classList.remove('text-gray-400');
        renderTeamCards(category);
    }

document.addEventListener('DOMContentLoaded', () => {
    const menuBtn = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuIconPath = document.getElementById('menu-icon-path');

    // SUNNY 브랜드 컬러 변수
    const sunnyPurple = getComputedStyle(document.documentElement).getPropertyValue('--sunny-purple').trim() || '#63489a';
    const sunnyDeepPurple = '#4e387a'; // 선택 시 더 진한 색상

    menuBtn.addEventListener('click', () => {
        const isHidden = mobileMenu.classList.toggle('hidden');
        
        if (isHidden) {
            // 닫힘 상태: 기본 보라색 + 햄버거 아이콘
            menuBtn.style.color = sunnyPurple;
            menuIconPath.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
        } else {
            // 열림 상태: 진한 보라색 + X 아이콘
            menuBtn.style.color = sunnyDeepPurple;
            menuIconPath.setAttribute('d', 'M6 18L18 6M6 6l12 12');
        }
    });

    // 바깥 영역 클릭 시 자동 닫기 및 색상 복구
    window.addEventListener('click', (e) => {
        if (!menuBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
            if (!mobileMenu.classList.contains('hidden')) {
                mobileMenu.classList.add('hidden');
                menuBtn.style.color = sunnyPurple;
                menuIconPath.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
            }
        }
    });
});
    
    document.addEventListener('DOMContentLoaded', () => renderTeamCards('all'));
</script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
