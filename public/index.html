<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 SUNNY Scholar 아카이브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');

        :root {
            --sunny-purple: #63489a;
            --sunny-deep-purple: #4e387a;
            --sunny-gradient: linear-gradient(135deg, #4f319b 0%, #8c52ff 100%);
            --grid-color: rgba(99, 72, 154, 0.05);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #fcfcfd;
            background-image: 
                linear-gradient(to bottom, rgba(99, 72, 154, 0.05) 0%, transparent 15%),
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        /* --- 새로운 팀 카드 스타일 --- */
        .team-card {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            background: #ffffff;
            border: 1px solid #f0f0f5;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }
        .team-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 40px 80px -15px rgba(99, 60, 187, 0.15);
            border-color: #d1d1e9;
        }

        .card-banner {
            position: relative;
            min-height: 180px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }
        
        .banner-bg-text {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            line-height: 1;
            user-select: none;
            pointer-events: none;
            font-style: italic;
            letter-spacing: -0.05em;
        }

        .tag-block {
            display: inline-block;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 800;
            border-radius: 6px;
            margin-right: 4px;
            letter-spacing: -0.02em;
        }

        .article-title {
            line-height: 1.4;
            word-break: keep-all;
        }
        
        /* 필터 버튼 스타일 유지 및 개선 */
        .filter-btn { transition: all 0.3s ease; font-weight: 800; }
        .filter-btn.active { color: white; background-color: var(--sunny-purple); border-color: var(--sunny-purple); }

        /* 기존 헤더/히어로 스타일 유지 */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .bg-sunny-gradient { background: var(--sunny-gradient); }
        .text-gradient { background: var(--sunny-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-text-box { background: white; padding: 4px 16px; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body class="text-gray-900">

<header class="sticky top-0 z-50 glass">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-14 md:h-16">
            <a href="index.html" class="flex items-center">
                <img src="/images/sunny_scholar_logo.png" alt="Logo" class="h-7 md:h-8 w-auto">
            </a>
            <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase text-gray-800">
                <a href="article_list.html" class="hover:text-[#63489a]">Articles</a>
                <a href="team_list.html" class="hover:text-[#63489a]">Lab</a>
                <a href="about.html" class="hover:text-[#63489a]">About</a>
            </nav>
        </div>
    </div>
</header>

<section class="bg-sunny-gradient pt-12 pb-16 px-6 relative overflow-hidden text-center text-white">
    <div class="max-w-7xl mx-auto relative z-10 animate__animated animate__fadeInUp">
        <p class="mb-3 text-purple-200 font-bold tracking-widest text-[10px] uppercase">Step 01: Problem Definition</p>
        <h1 class="text-3xl md:text-5xl font-black mb-4 leading-tight">
            2026 Sunny Scholar <br>
            <div class="gradient-text-box mt-2"><span class="text-gradient">문제정의 아카이빙</span></div>
        </h1>
        <p class="text-sm md:text-base opacity-90 font-medium mb-8 max-w-xl mx-auto leading-relaxed">
            5개의 팀이 현장에서 발견하고 분석한 사회문제의 진짜 원인을 아티클로 만나보세요.
        </p>
    </div>
</section>

<main id="teams" class="max-w-7xl mx-auto px-6 lg:px-8 py-12 md:py-16">
    <div class="flex flex-col md:flex-row justify-between items-end mb-10 border-b border-gray-100 pb-6">
        <div class="text-left">
            <h2 class="text-xl font-black text-gray-900 mb-1 tracking-tight">Research Spectrum.</h2>
            <p class="text-gray-400 text-[11px] font-bold uppercase tracking-wider">Total 5 Teams / Archive</p>
        </div>
        <div class="flex space-x-2 mt-4 md:mt-0" id="filter-group">
            <button onclick="filterTeams('all')" class="filter-btn active px-4 py-1.5 rounded-full border border-gray-200 text-[11px]">ALL</button>
            <button onclick="filterTeams('자립')" class="filter-btn px-4 py-1.5 rounded-full border border-gray-200 text-[11px] text-gray-400 hover:border-[#63489a] hover:text-[#63489a]">#자립준비</button>
            <button onclick="filterTeams('장애')" class="filter-btn px-4 py-1.5 rounded-full border border-gray-200 text-[11px] text-gray-400 hover:border-[#63489a] hover:text-[#63489a]">#장애/복지</button>
            <button onclick="filterTeams('이주')" class="filter-btn px-4 py-1.5 rounded-full border border-gray-200 text-[11px] text-gray-400 hover:border-[#63489a] hover:text-[#63489a]">#이주민</button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10" id="team-container"></div>
</main>

<footer class="bg-gray-900 py-10 px-6 text-center text-gray-600">
    <p class="text-[10px] font-bold">© 2026 SUNNY Scholar Archive. Designed for Problem Definers.</p>
</footer>

<script src="data.js"></script>
<script>
    function renderTeamSections() {
        const container = document.getElementById('article-page-container');
        if (!container) return;

        // 데이터 존재 여부 확인 (오류 방지)
        if (typeof TEAM_DATA === 'undefined' || typeof SUNNY_DATA === 'undefined') {
            console.error("데이터를 찾을 수 없습니다. data.js 파일 경로를 확인해주세요.");
            container.innerHTML = `<div class="text-center py-20 text-gray-400">데이터 로딩 중 오류가 발생했습니다.</div>`;
            return;
        }

        container.innerHTML = '';

        Object.keys(TEAM_DATA).forEach(id => {
            const team = TEAM_DATA[id];
            const teamArticles = SUNNY_DATA.filter(article => article.teamId === id);

            const section = document.createElement('section');
            section.id = id;
            section.className = "mb-24 scroll-mt-28";

            section.innerHTML = `
                <div class="team-header-banner" style="background: ${team.theme.grad}">
                    <div class="bg-text-large">${team.theme.bgText}</div>
                    <div class="relative z-10">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="px-3 py-1 bg-white/20 rounded-md text-[10px] font-black tracking-widest uppercase">
                                ${team.order}
                            </span>
                            <span class="text-xs font-bold opacity-80">${team.category}</span>
                        </div>
                        <h2 class="text-4xl font-black mb-4 tracking-tight">${team.teamName}</h2>
                        <p class="text-lg opacity-90 whitespace-pre-line mb-8 font-medium max-w-2xl leading-relaxed">
                            ${team.summary}
                        </p>
                        <div class="flex flex-wrap gap-2">
                            ${team.tags.map(tag => `
                                <span class="px-4 py-1.5 bg-white text-gray-900 rounded-full text-[11px] font-bold shadow-sm">
                                    #${tag}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${teamArticles.length > 0 ? 
                        teamArticles.map(art => `
                            <div class="article-card bg-white p-8 rounded-2xl border border-gray-100 shadow-sm flex flex-col cursor-pointer" 
                                 onclick="location.href='article_view.html?id=${art.id}'">
                                <span class="text-[10px] font-black text-[#63489a] mb-3 tracking-widest uppercase">${art.part || 'Research'}</span>
                                <h4 class="text-xl font-bold text-gray-900 mb-6 leading-snug break-keep">${art.title}</h4>
                                <div class="mt-auto flex justify-between items-center text-gray-400 hover:text-[#63489a] transition-colors">
                                    <span class="text-xs font-bold uppercase tracking-tighter">Read Article</span>
                                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                    </div>
                                </div>
                            </div>
                        `).join('') 
                        : `<div class="col-span-full py-12 text-center border-2 border-dashed border-gray-100 rounded-2xl text-gray-300 font-bold">등록된 아티클이 없습니다.</div>`
                    }
                </div>
            `;
            container.appendChild(section);
        });
    }

    // 초기 실행 로직 강화
    document.addEventListener('DOMContentLoaded', () => {
        // 데이터가 로드될 때까지 잠시 대기 후 렌더링 (비동기 대응)
        renderTeamSections();
        
        if (window.location.hash) {
            const targetId = window.location.hash;
            setTimeout(() => {
                const element = document.querySelector(targetId);
                if (element) {
                    const offset = 100;
                    const elementPosition = element.getBoundingClientRect().top + window.pageYOffset;
                    window.scrollTo({
                        top: elementPosition - offset,
                        behavior: 'smooth'
                    });
                }
            }, 300); // 렌더링 시간을 고려해 300ms 대기
        }
    });
</script>
</body>
</html>
