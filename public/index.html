<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 SUNNY Scholar 아카이브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');

        :root {
            --sunny-purple: #63489a;
            --sunny-deep-purple: #4e387a;
            --sunny-gradient: linear-gradient(135deg, #4f319b 0%, #8c52ff 100%);
            --grid-color: rgba(99, 72, 154, 0.05);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #fcfcfd;
            background-image: 
                linear-gradient(to bottom, rgba(99, 72, 154, 0.05) 0%, transparent 15%),
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        /* --- 새로운 팀 카드 스타일 --- */
        .team-card {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            background: #ffffff;
            border: 1px solid #f0f0f5;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }
        .team-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 40px 80px -15px rgba(99, 60, 187, 0.15);
            border-color: #d1d1e9;
        }

        .card-banner {
            position: relative;
            min-height: 180px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }
        
        .banner-bg-text {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            line-height: 1;
            user-select: none;
            pointer-events: none;
            font-style: italic;
            letter-spacing: -0.05em;
        }

        .tag-block {
            display: inline-block;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 800;
            border-radius: 6px;
            margin-right: 4px;
            letter-spacing: -0.02em;
        }

        .article-title {
            line-height: 1.4;
            word-break: keep-all;
        }
        
        /* 필터 버튼 스타일 유지 및 개선 */
        .filter-btn { transition: all 0.3s ease; font-weight: 800; }
        .filter-btn.active { color: white; background-color: var(--sunny-purple); border-color: var(--sunny-purple); }

        /* 기존 헤더/히어로 스타일 유지 */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .bg-sunny-gradient { background: var(--sunny-gradient); }
        .text-gradient { background: var(--sunny-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-text-box { background: white; padding: 4px 16px; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body class="text-gray-900">

<header class="sticky top-0 z-50 glass">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-14 md:h-16">
            <a href="index.html" class="flex items-center">
                <img src="/images/sunny_scholar_logo.png" alt="Logo" class="h-7 md:h-8 w-auto">
            </a>
            <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase text-gray-800">
                <a href="article_list.html" class="hover:text-[#63489a]">Articles</a>
                <a href="team_list.html" class="hover:text-[#63489a]">Lab</a>
                <a href="about.html" class="hover:text-[#63489a]">About</a>
            </nav>
        </div>
    </div>
</header>

<section class="bg-sunny-gradient pt-12 pb-16 px-6 relative overflow-hidden text-center text-white">
    <div class="max-w-7xl mx-auto relative z-10 animate__animated animate__fadeInUp">
        <p class="mb-3 text-purple-200 font-bold tracking-widest text-[10px] uppercase">Step 01: Problem Definition</p>
        <h1 class="text-3xl md:text-5xl font-black mb-4 leading-tight">
            2026 Sunny Scholar <br>
            <div class="gradient-text-box mt-2"><span class="text-gradient">문제정의 아카이빙</span></div>
        </h1>
        <p class="text-sm md:text-base opacity-90 font-medium mb-8 max-w-xl mx-auto leading-relaxed">
            5개의 팀이 현장에서 발견하고 분석한 사회문제의 진짜 원인을 아티클로 만나보세요.
        </p>
    </div>
</section>

<main id="teams" class="max-w-7xl mx-auto px-6 lg:px-8 py-12 md:py-16">
    <div class="flex flex-col md:flex-row justify-between items-end mb-10 border-b border-gray-100 pb-6">
        <div class="text-left">
            <h2 class="text-xl font-black text-gray-900 mb-1 tracking-tight">Research Spectrum.</h2>
            <p class="text-gray-400 text-[11px] font-bold uppercase tracking-wider">Total 5 Teams / Archive</p>
        </div>
        <div class="flex space-x-2 mt-4 md:mt-0" id="filter-group">
            <button onclick="filterTeams('all')" class="filter-btn active px-4 py-1.5 rounded-full border border-gray-200 text-[11px]">ALL</button>
            <button onclick="filterTeams('자립')" class="filter-btn px-4 py-1.5 rounded-full border border-gray-200 text-[11px] text-gray-400 hover:border-[#63489a] hover:text-[#63489a]">#자립준비</button>
            <button onclick="filterTeams('장애')" class="filter-btn px-4 py-1.5 rounded-full border border-gray-200 text-[11px] text-gray-400 hover:border-[#63489a] hover:text-[#63489a]">#장애/복지</button>
            <button onclick="filterTeams('이주')" class="filter-btn px-4 py-1.5 rounded-full border border-gray-200 text-[11px] text-gray-400 hover:border-[#63489a] hover:text-[#63489a]">#이주민</button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10" id="team-container"></div>
</main>

<footer class="bg-gray-900 py-10 px-6 text-center text-gray-600">
    <p class="text-[10px] font-bold">© 2026 SUNNY Scholar Archive. Designed for Problem Definers.</p>
</footer>
<script src="data.js"></script>
<script>
    // 팀 카드를 렌더링하는 함수
    function renderTeamCards(filter = 'all') {
        const container = document.getElementById('team-container');
        if (!container) return;

        // 데이터 존재 여부 확인
        if (typeof TEAM_DATA === 'undefined') {
            console.error("TEAM_DATA를 찾을 수 없습니다.");
            return;
        }

        container.innerHTML = ''; // 초기화

        Object.keys(TEAM_DATA).forEach(id => {
            const team = TEAM_DATA[id];

            // 필터링 로직 (카테고리 매칭)
            if (filter !== 'all' && team.category !== filter) return;

            const card = document.createElement('div');
            card.className = "team-card group animate__animated animate__fadeIn";
            // 클릭 시 article_list.html의 해당 팀 위치(#id)로 이동
            card.onclick = () => {
                location.href = `article_list.html#${id}`;
            };

            card.innerHTML = `
                <div class="card-banner text-white" style="background: ${team.theme.grad}">
                    <div class="banner-bg-text">${team.theme.bgText}</div>
                    <div class="relative z-10">
                        <span class="text-[9px] font-black tracking-[0.3em] mb-2 block uppercase opacity-70">${team.order}</span>
                        <h3 class="text-2xl font-black tracking-tighter leading-none mb-4">${team.teamName}</h3>
                        <p class="text-[13px] font-bold leading-snug text-white/90 whitespace-pre-line">
                            ${team.summary}
                        </p>
                    </div>
                </div>
                <div class="p-6 flex flex-col flex-grow bg-white">
                    <div class="flex flex-wrap gap-1.5 mb-6">
                        ${team.tags.map(tag => `
                            <span class="tag-block" style="background-color: ${team.theme.tagBg}; color: ${team.theme.main}">#${tag}</span>
                        `).join('')}
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-50 flex justify-between items-center">
                        <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest group-hover:text-[#63489a] transition-colors">View Articles</span>
                        <div class="w-7 h-7 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-[#63489a] group-hover:text-white transition-all">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 필터링 함수
    function filterTeams(category) {
        // 버튼 활성화 스타일 제어
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            btn.classList.remove('active', 'text-white', 'bg-[#63489a]');
            btn.classList.add('text-gray-400');
        });

        // 클릭된 버튼 스타일 적용
        const activeBtn = event.currentTarget;
        activeBtn.classList.add('active', 'text-white', 'bg-[#63489a]');
        activeBtn.classList.remove('text-gray-400');

        renderTeamCards(category);
    }

    // 페이지 로드 시 실행
    document.addEventListener('DOMContentLoaded', () => {
        renderTeamCards('all');
    });
</script>
</body>
</html>
