<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root {
            --sunny-purple: #63489a;
            --grid-color: rgba(99, 72, 154, 0.05);
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8f9ff;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            letter-spacing: -0.02em;
        }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        /* 팀명 길이에 따른 줄바꿈 및 생략 방지 */
        .team-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: keep-all;
        }
    </style>
</head>
<body class="text-gray-900">

    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html"><img src="images/sunny_scholar_logo.png" alt="Logo" class="h-8" onerror="this.src='https://via.placeholder.com/150x40?text=SUNNY+LOGO'"></a>
            <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                <a href="article_list.html" class="text-gray-800 hover:text-[#63489a]">Articles</a>
                <a href="team_list.html" class="text-[#63489a]">Lab</a>
                <a href="about.html" class="text-gray-800 hover:text-[#63489a]">About</a>
            </nav>
        </div>
    </header>

    <section class="py-16 px-6 max-w-7xl mx-auto">
        <p class="text-[#63489a] font-black tracking-widest text-[10px] uppercase mb-2">2026 SUNNY LAB</p>
        <h1 class="text-4xl font-black mb-2 tracking-tight">Change Maker <span class="text-[#63489a]">Teams</span></h1>
        <p class="text-gray-500 text-sm font-medium">5개의 팀이 만들어가는 변화의 움직임을 확인하세요.</p>

            </div>

            <div class="aspect-[16/10] bg-gray-200 rounded-[32px] overflow-hidden border border-gray-100 shadow-sm transition-transform hover:scale-[1.02] duration-500">
                <img src="images/sunny_group_1.jpg" alt="Sunny Group 1" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\'flex items-center justify-center h-full text-gray-400 font-bold\'>PHOTO 1</div>'">
            </div>
            <div class="aspect-[16/10] bg-gray-200 rounded-[32px] overflow-hidden border border-gray-100 shadow-sm transition-transform hover:scale-[1.02] duration-500">
                <img src="images/sunny_group_2.jpg" alt="Sunny Group 2" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\'flex items-center justify-center h-full text-gray-400 font-bold\'>PHOTO 2</div>'">
            </div>
            <div class="aspect-[16/10] bg-gray-200 rounded-[32px] overflow-hidden border border-gray-100 shadow-sm transition-transform hover:scale-[1.02] duration-500">
                <img src="images/sunny_group_3.jpg" alt="Sunny Group 3" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\'flex items-center justify-center h-full text-gray-400 font-bold\'>PHOTO 3</div>'">
            </div>
        </div>
    </main>
