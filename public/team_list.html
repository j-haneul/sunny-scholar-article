<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root { --sunny-purple: #63489a; --grid-color: rgba(99, 72, 154, 0.05); }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8f9ff;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            letter-spacing: -0.02em;
        }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .team-title { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: keep-all; }
    </style>
</head>
<body class="text-gray-900">

    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html"><img src="images/sunny_scholar_logo.png" alt="Logo" class="h-8" onerror="this.src='https://via.placeholder.com/150x40?text=SUNNY+LOGO'"></a>
            <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                <a href="article_list.html" class="text-gray-800 hover:text-[#63489a]">Articles</a>
                <a href="team_list.html" class="text-[#63489a]">Lab</a>
                <a href="about.html" class="text-gray-800 hover:text-[#63489a]">About</a>
            </nav>
        </div>
    </header>

    <section class="py-16 px-6 max-w-7xl mx-auto">
        <p class="text-[#63489a] font-black tracking-widest text-[10px] uppercase mb-2">2026 SUNNY LAB</p>
        <h1 class="text-4xl font-black mb-2 tracking-tight">Change Maker <span class="text-[#63489a]">Teams</span></h1>
        <p class="text-gray-500 text-sm font-medium">5개의 팀이 만들어가는 변화의 움직임을 확인하세요.</p>
    </section>

    <main class="max-w-[1600px] mx-auto px-6 pb-24">
        <div id="team-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-12 min-h-[320px]">
            <p class="col-span-full text-center py-20 text-gray-400">데이터를 불러오는 중입니다...</p>
        </div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="group/img relative aspect-[16/10] bg-gray-200 rounded-[32px] overflow-hidden border border-gray-100 shadow-sm transition-all duration-500 hover:shadow-xl hover:-translate-y-1">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=800&q=80" 
             class="w-full h-full object-cover transition-transform duration-700 group-hover/img:scale-110">
    </div>
    <div class="group/img relative aspect-[16/10] bg-gray-200 rounded-[32px] overflow-hidden border border-gray-100 shadow-sm transition-all duration-500 hover:shadow-xl hover:-translate-y-1">
        <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=800&q=80" 
             class="w-full h-full object-cover transition-transform duration-700 group-hover/img:scale-110">
    </div>
    <div class="group/img relative aspect-[16/10] bg-gray-200 rounded-[32px] overflow-hidden border border-gray-100 shadow-sm transition-all duration-500 hover:shadow-xl hover:-translate-y-1">
        <img src="https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&w=800&q=80" 
             class="w-full h-full object-cover transition-transform duration-700 group-hover/img:scale-110">
    </div>
</div>
    </main>

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('team-grid');
            
            // 데이터 변수명 확인 (TEAM_DATA 또는 TEAM_DETAILS)
            const sourceData = typeof TEAM_DATA !== 'undefined' ? TEAM_DATA : (typeof TEAM_DETAILS !== 'undefined' ? TEAM_DETAILS : null);

            if (!sourceData) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-red-500 font-bold">data.js를 찾을 수 없거나 데이터가 비어있습니다.</p>`;
                return;
            }

            grid.innerHTML = Object.entries(sourceData).map(([id, team]) => {
                const name = team.teamName || team.name || "Unknown Team";
                const themeColor = (team.theme && team.theme.main) ? team.theme.main : "#63489a";
                const fontSize = name.length > 8 ? 'text-xl' : 'text-2xl';

                return `
                    <div class="group relative flex flex-col h-[320px] rounded-[32px] overflow-hidden transition-all duration-500 hover:shadow-2xl animate__animated animate__fadeIn"
                         style="background-color: ${themeColor}"> 
                        
                        <div class="p-7 pb-0 relative z-10">
                            <span class="inline-block px-3 py-1 rounded-full bg-white/20 backdrop-blur-md text-white text-[10px] font-black uppercase tracking-widest">
                                ${team.order || '00'}
                            </span>
                        </div>

                        <div class="flex-1 px-7 pt-4 flex flex-col justify-start relative z-10 overflow-hidden">
                            <h3 class="${fontSize} font-black text-white mb-3 leading-tight team-title">
                                ${name}
                            </h3>
                            <div class="flex flex-wrap gap-1.5">
                                ${(team.tags || []).map(tag => `
                                    <span class="px-2.5 py-1 rounded-lg bg-white/10 text-white text-[10px] font-bold backdrop-blur-sm">#${tag}</span>
                                `).join('')}
                            </div>
                        </div>

                        <div class="p-6 mt-auto relative z-10">
                            <a href="team_detail.html?teamId=${id}" 
                               class="flex items-center justify-between w-full px-4 py-3.5 bg-white/15 hover:bg-white text-white hover:text-gray-900 rounded-2xl transition-all duration-300 group/btn border border-white/10 shadow-lg">
                                <span class="text-[12px] font-black">팀 소개 보러가기</span>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path>
                                </svg>
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
