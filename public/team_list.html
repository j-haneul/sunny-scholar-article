<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root {
            --sunny-purple: #63489a;
            --sunny-gradient: linear-gradient(135deg, #4f319b 0%, #8c52ff 100%);
            --grid-color: rgba(99, 72, 154, 0.05);
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8f9ff;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            letter-spacing: -0.02em;
        }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        .team-card { 
            transition: all 0.3s ease; 
            background: white;
            border-radius: 1.5rem;
            border: 1px solid rgba(226, 232, 240, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .team-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(99, 72, 154, 0.08);
            border-color: var(--sunny-purple);
        }
        .text-gradient {
            background: var(--sunny-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-gray-900">

    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center">
                    <img src="images/sunny_scholar_logo.png" alt="Logo" class="h-8 w-auto">
                </a>
                <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                    <a href="article_list.html" class="text-gray-800 hover:text-[#63489a] transition">Articles</a>
                    <a href="team_list.html" class="text-[#63489a] transition">Lab</a>
                    <a href="about.html" class="text-gray-800 hover:text-[#63489a] transition">About</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="py-16 px-6">
        <div class="max-w-7xl mx-auto text-left">
            <p class="text-[#63489a] font-black tracking-widest text-[10px] uppercase mb-2">2026 SUNNY LAB</p>
            <h1 class="text-3xl md:text-4xl font-black mb-2 tracking-tight">
                Change Maker <span class="text-gradient">Teams</span>
            </h1>
            <p class="text-gray-500 text-sm font-medium">사회 문제를 해결하기 위해 모인 팀들을 소개합니다.</p>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="team-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script src="data.js"></script>
    <script>
        function renderTeams() {
            const grid = document.getElementById('team-grid');
            
            // 1. 데이터 소스 변수명 확인 (TEAM_DATA 또는 TEAM_DETAILS)
            // data.js에 있는 이름이 TEAM_DATA라면 아래처럼 수정해야 합니다.
            const sourceData = typeof TEAM_DATA !== 'undefined' ? TEAM_DATA : (typeof TEAM_DETAILS !== 'undefined' ? TEAM_DETAILS : null);

            if (!sourceData) {
                console.error("데이터를 찾을 수 없습니다.");
                return;
            }

            grid.innerHTML = Object.entries(sourceData).map(([id, team]) => `
                <div class="team-card p-8 animate__animated animate__fadeInUp">
                    <div>
                        <span class="inline-block bg-purple-50 text-[#63489a] text-[10px] font-black px-3 py-1 rounded-full uppercase mb-4">
                            ${team.order || '-'}
                        </span>
                        <h3 class="text-2xl font-black text-gray-900 mb-3 leading-tight">
                            ${team.teamName || team.name}
                        </h3>
                        <p class="text-gray-500 text-sm leading-relaxed line-clamp-3 mb-6 font-medium">
                            ${team.summary || team.description}
                        </p>
                    </div>
                    
                    <a href="team_detail.html?teamId=${id}" class="inline-flex items-center justify-center w-full py-4 bg-gray-50 hover:bg-[#63489a] text-[#63489a] hover:text-white text-xs font-black rounded-xl transition-all duration-300 uppercase tracking-widest group">
                        View Lab Profile
                        <span class="ml-2 transform group-hover:translate-x-1 transition-transform">→</span>
                    </a>
                </div>
            `).join('');
        }
        
        // 페이지 로드 시 실행
        window.addEventListener('load', renderTeams);
    </script>
</body>
</html>
