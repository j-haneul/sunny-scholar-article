<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        :root {
            --sunny-purple: #63489a;
            --grid-color: rgba(99, 72, 154, 0.05);
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8f9ff;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            letter-spacing: -0.02em;
        }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        /* 1열 세로형 카드 스타일 */
        .team-wide-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .team-wide-card:hover { 
            transform: scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="text-gray-900">

    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html"><img src="images/sunny_scholar_logo.png" alt="Logo" class="h-8"></a>
            <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                <a href="article_list.html" class="text-gray-800 hover:text-[#63489a]">Articles</a>
                <a href="team_list.html" class="text-[#63489a]">Lab</a>
                <a href="about.html" class="text-gray-800 hover:text-[#63489a]">About</a>
            </nav>
        </div>
    </header>

    <section class="py-16 px-6 max-w-5xl mx-auto">
        <p class="text-[#63489a] font-black tracking-widest text-[10px] uppercase mb-2">2026 SUNNY LAB</p>
        <h1 class="text-4xl font-black mb-2 tracking-tight">Change Maker <span class="text-[#63489a]">Teams</span></h1>
        <p class="text-gray-500 text-sm font-medium">5개의 팀이 만들어가는 변화의 움직임을 확인하세요.</p>
    </section>

    <main class="max-w-5xl mx-auto px-6 pb-24">
        <div id="team-grid" class="flex flex-col gap-8">
            </div>
    </main>

    <script src="data.js"></script>
    <script>
        function renderTeams() {
            const grid = document.getElementById('team-grid');
            // TEAM_DATA와 TEAM_DETAILS 모두 대응
            const sourceData = typeof TEAM_DATA !== 'undefined' ? TEAM_DATA : (typeof TEAM_DETAILS !== 'undefined' ? TEAM_DETAILS : null);

            if (!sourceData) return;

            grid.innerHTML = Object.entries(sourceData).map(([id, team]) => `
                <div class="team-wide-card relative overflow-hidden rounded-[32px] p-8 md:p-12 animate__animated animate__fadeInUp" 
                     style="background-color: ${team.theme.tagBg}">
                    
                    <div class="absolute -right-4 -bottom-10 text-[160px] font-black opacity-10 select-none" style="color: ${team.theme.main}">
                        ${team.order.replace('TEAM ', '')}
                    </div>

                    <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-8">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-4">
                                <span class="px-3 py-1 rounded-full text-[11px] font-black bg-white shadow-sm" style="color: ${team.theme.main}">
                                    ${team.order}
                                </span>
                            </div>
                            
                            <h3 class="text-3xl md:text-5xl font-black mb-6 tracking-tighter" style="color: ${team.theme.main}">
                                ${team.teamName || team.name}
                            </h3>

                            <div class="flex flex-wrap gap-2">
                                ${(team.tags || []).map(tag => `
                                    <span class="px-4 py-2 rounded-xl text-[13px] md:text-[14px] font-bold bg-white/50 backdrop-blur-sm border border-white/50" style="color: ${team.theme.main}">
                                        #${tag}
                                    </span>
                                `).join('')}
                            </div>
                        </div>

                        <div class="flex-shrink-0">
                            <a href="team_detail.html?teamId=${id}" 
                               class="inline-flex items-center justify-center px-8 py-4 bg-white rounded-2xl font-black text-sm transition-all hover:shadow-lg hover:-translate-y-1"
                               style="color: ${team.theme.main}">
                                팀 소개 보러가기
                                <svg class="ml-2 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        window.addEventListener('load', renderTeams);
    </script>
</body>
</html>
