<script>
    function setActiveMenu() {
        const path = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');

        navLinks.forEach(link => {
            link.classList.remove('active-tab');
            const href = link.getAttribute('href');
            
            // 1. 현재 파일명(team_detail.html)이 href에 포함되거나,
            // 2. 팀 상세 페이지일 경우 'Lab(team_list.html)' 메뉴를 활성화
            if (path.includes(href) && href !== "") {
                link.classList.add('active-tab');
            } else if (path.includes('team_detail.html') && href === 'team_list.html') {
                link.classList.add('active-tab');
            }
        });
    }
    window.addEventListener('load', setActiveMenu);
</script>    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

}

/* 밑줄 효과 */
.nav-link::after {
    content: '' !important;

}

.nav-link:hover::after,

}

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('team-grid');
            
            // 데이터 변수명 확인 (TEAM_DATA 또는 TEAM_DETAILS)
            const sourceData = typeof TEAM_DATA !== 'undefined' ? TEAM_DATA : (typeof TEAM_DETAILS !== 'undefined' ? TEAM_DETAILS : null);

            if (!sourceData) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-red-500 font-bold">data.js를 찾을 수 없거나 데이터가 비어있습니다.</p>`;
                return;
            }

            grid.innerHTML = Object.entries(sourceData).map(([id, team]) => {
                const name = team.teamName || team.name || "Unknown Team";
                const themeColor = (team.theme && team.theme.main) ? team.theme.main : "#63489a";
                const fontSize = name.length > 8 ? 'text-xl' : 'text-2xl';

                return `
                    <div class="group relative flex flex-col h-[320px] rounded-[32px] overflow-hidden transition-all duration-500 hover:shadow-2xl animate__animated animate__fadeIn"
                         style="background-color: ${themeColor}"> 
                        
                        <div class="p-7 pb-0 relative z-10">
                            <span class="inline-block px-3 py-1 rounded-full bg-white/20 backdrop-blur-md text-white text-[10px] font-black uppercase tracking-widest">
                                ${team.order || '00'}
                            </span>
                        </div>

                        <div class="flex-1 px-7 pt-4 flex flex-col justify-start relative z-10 overflow-hidden">
                            <h3 class="${fontSize} font-black text-white mb-3 leading-tight team-title">
                                ${name}
                            </h3>
                            <div class="flex flex-wrap gap-1.5">
                                ${(team.tags || []).map(tag => `
                                    <span class="px-2.5 py-1 rounded-lg bg-white/10 text-white text-[10px] font-bold backdrop-blur-sm">#${tag}</span>
                                `).join('')}
                            </div>
                        </div>

                        <div class="p-6 mt-auto relative z-10">
                            <a href="team_detail.html?teamId=${id}" 
                               class="flex items-center justify-between w-full px-4 py-3.5 bg-white/15 hover:bg-white text-white hover:text-gray-900 rounded-2xl transition-all duration-300 group/btn border border-white/10 shadow-lg">
                                <span class="text-[12px] font-black">팀 소개 보러가기</span>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path>
                                </svg>
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        });
    </script>
