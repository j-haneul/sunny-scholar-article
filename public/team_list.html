<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script> 

<script>
function renderTeams() {
    const grid = document.getElementById('team-grid');
    
    // 데이터 로드 확인용 로그 (개발자 도구 F12에서 확인 가능)
    console.log("TEAM_DETAILS 데이터 확인:", typeof TEAM_DETAILS !== 'undefined' ? TEAM_DETAILS : "없음");

    // 1. 데이터 존재 확인
    if (typeof TEAM_DETAILS === 'undefined') {
        grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 font-bold">데이터(data.js)를 불러오지 못했습니다.</p>';
        return;
    }

    // 2. 객체를 배열로 변환해서 출력
    const teamHTML = Object.entries(TEAM_DETAILS).map(([id, team]) => `
        <a href="team_detail.html?id=${id}" class="team-card group block">
            <div class="team-img-wrapper mb-5 shadow-lg shadow-purple-900/5">
                <img src="${team.teamProfileImg}" alt="${team.name}" class="team-img" 
                     onerror="this.src='https://via.placeholder.com/300x400?text=SUNNY+LAB'">
            </div>
            <div class="px-1">
                <div class="text-[10px] font-black text-[#63489a] mb-2 tracking-widest uppercase">${team.order}</div>
                <h3 class="font-black text-lg leading-tight group-hover:text-[#63489a] transition-colors">
                    ${team.name}
                </h3>
                <p class="mt-2 text-xs text-gray-400 font-medium line-clamp-2 leading-relaxed">
                    ${team.description}
                </p>
            </div>
        </a>
    `).join('');

    grid.innerHTML = teamHTML;
}

// 페이지가 완전히 로드된 후 실행
window.addEventListener('load', renderTeams);
</script>
<body>

       <!-- Header (Height Reduced) -->
    <header class="sticky top-0 z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-14 md:h-16">
                <a href="index.html" class="flex items-center">
                    <img src="/images/sunny_scholar_logo.png" alt="sunny_scholar_logo.png" class="h-7 md:h-8 w-auto">
                </a>
                
                <nav class="hidden md:flex space-x-10 text-xs font-black tracking-widest uppercase">
                    <a href="article_list.html" class="nav-link text-gray-800 hover:text-sunny transition">Articles</a>
                    <a href="team_list.html" class="nav-link text-gray-800 hover:text-sunny transition">Lab</a>
                    <a href="about.html" class="nav-link text-gray-800 hover:text-sunny transition">About</a>
                </nav>

                <div class="md:hidden">
                    <button class="p-2 text-gray-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m4 6h16"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </header>


    <main class="max-w-7xl mx-auto px-6 py-20">
        <div class="mb-16">
            <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tighter">SUNNY Lab Teams</h1>
            <p class="text-gray-500 font-medium">2026년 사회 변화를 일구는 팀들을 소개합니다.</p>
        </div>

        <div id="team-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
            </div>
    </main>
<script>
function renderTeams() {
    const grid = document.getElementById('team-grid');
    
    // 1. 데이터 존재 확인 (TEAM_DETAILS가 data.js에 선언되어 있어야 함)
    if (typeof TEAM_DETAILS === 'undefined') {
        grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 font-bold">데이터를 찾을 수 없습니다.</p>';
        return;
    }

    // 2. 객체를 배열로 변환해서 출력
    const teamHTML = Object.entries(TEAM_DETAILS).map(([id, team]) => `
        <a href="team_detail.html?id=${id}" class="team-card group block">
            <div class="team-img-wrapper mb-5 shadow-lg shadow-purple-900/5">
                <img src="${team.teamProfileImg}" alt="${team.name}" class="team-img" 
                     onerror="this.src='https://via.placeholder.com/300x400?text=SUNNY+LAB'">
            </div>
            <div class="px-1">
                <div class="text-[10px] font-black text-[#63489a] mb-2 tracking-widest uppercase">${team.order}</div>
                <h3 class="font-black text-lg leading-tight group-hover:text-[#63489a] transition-colors">
                    ${team.name}
                </h3>
                <p class="mt-2 text-xs text-gray-400 font-medium line-clamp-2 leading-relaxed">
                    ${team.description}
                </p>
            </div>
        </a>
    `).join('');

    grid.innerHTML = teamHTML;
}
window.onload = renderTeams;
</script>
</body>
</html>
