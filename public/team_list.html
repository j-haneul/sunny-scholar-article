<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams | 2026 SUNNY Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #fcfcfd; letter-spacing: -0.02em; }
        .team-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .team-card:hover { transform: translateY(-8px); }
        .team-img-wrapper { aspect-ratio: 3/4; overflow: hidden; border-radius: 1.5rem; background: #eee; }
        .team-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .team-card:hover .team-img { transform: scale(1.05); }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
            <a href="index.html" class="font-black text-[#63489a] text-lg">SUNNY Scholar</a>
            <nav class="flex space-x-8 text-[11px] font-black uppercase tracking-widest">
                <a href="article_list.html" class="hover:text-[#63489a]">Articles</a>
                <a href="team_list.html" class="text-[#63489a]">Lab</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <div class="mb-16">
            <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tighter">SUNNY Lab Teams</h1>
            <p class="text-gray-500 font-medium">2026년 사회 변화를 일구는 팀들을 소개합니다.</p>
        </div>

        <div id="team-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
            </div>
    </main>
<script>
    function loadTeamDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const teamId = urlParams.get('id');

        // 1. 데이터 존재 확인
        if (!teamId || !TEAM_DETAILS[teamId]) {
            document.getElementById('display-team-name').innerText = "팀 정보를 찾을 수 없습니다.";
            return;
        }

        const team = TEAM_DETAILS[teamId];

        // 2. 좌측 사이드바 데이터 매핑
        if (team.teamProfileImg) {
            document.getElementById('display-team-logo').src = team.teamProfileImg;
        }
        document.getElementById('display-team-order').innerText = team.order;
        document.getElementById('display-team-name').innerText = team.name;
        document.getElementById('display-team-desc').innerText = team.description;
        
        const emailEl = document.getElementById('display-team-email');
        emailEl.href = `mailto:${team.email}`;
        
        document.getElementById('display-team-sns').innerText = team.sns;

        // 3. 우측 콘텐츠 - 팀원 리스트 동적 생성
        const memberListContainer = document.getElementById('member-list');
        const memberHTML = team.members.map(m => `
            <div class="flex flex-col items-center animate__animated animate__fadeInUp">
                <div class="member-profile-img mb-4 shadow-lg shadow-purple-900/10 transition-transform hover:-translate-y-1">
                    <img src="${m.img}" alt="${m.name}" onerror="this.src='https://via.placeholder.com/80x110?text=SUNNY'">
                </div>
                <h3 class="font-black text-base text-gray-950">${m.name}</h3>
                <p class="text-[11px] text-gray-400 font-bold uppercase tracking-wider">${m.role}</p>
            </div>
        `).join('');
        memberListContainer.innerHTML = memberHTML;

        // 4. 해당 팀의 아티클 연동 (SUNNY_DATA에서 필터링)
        renderTeamArticles(teamId);
    }

    function renderTeamArticles(teamId) {
        // SUNNY_DATA에서 현재 팀의 아이디와 일치하는 아티클만 추출
        const teamArticles = SUNNY_DATA.filter(article => article.teamId === teamId);
        const articleSection = document.querySelector('section:last-of-type div:last-of-type');

        if (teamArticles.length > 0) {
            // 아티클이 있을 경우 리스트 생성
            const articleHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${teamArticles.map(article => `
                        <a href="${article.link}" class="group block bg-gray-50 rounded-2xl overflow-hidden hover:bg-white hover:shadow-xl transition-all duration-300 border border-transparent hover:border-purple-100">
                            <div class="aspect-video overflow-hidden">
                                <img src="${article.thumbnail}" alt="${article.title}" class="w-100 h-100 object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400x225?text=SUNNY+ARTICLE'">
                            </div>
                            <div class="p-6">
                                <div class="text-[10px] font-black text-[#63489a] mb-2 uppercase tracking-widest">${article.part}</div>
                                <h4 class="font-black text-lg group-hover:text-[#63489a] transition-colors line-clamp-1">${article.title}</h4>
                            </div>
                        </a>
                    `).join('')}
                </div>
            `;
            articleSection.classList.remove('text-center', 'py-12', 'text-gray-400', 'bg-gray-50');
            articleSection.innerHTML = articleHTML;
        } else {
            // 아티클이 없을 경우 기본 메시지 유지
            articleSection.innerHTML = "준비 중인 아티클이 없습니다.";
        }
    }

    window.onload = loadTeamDetail;
</script>
</body>
</html>
